<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    /* ─── Lucide-style Icons ──────────────────────────────────────── */
    const Icon = ({ size=24, strokeWidth=2, className='', fill='none', children, ...rest }) => (

      </svg>

    const PlayCircle   = ({fill='none',...p}) => <Icon fill={fill} {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft  = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
    const ArrowLeft    = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
    const Grid         = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></Icon>;

    const Database     = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
    const Server       = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>;
    const GitBranch    = (p) => <Icon {...p}><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></Icon>;
    const Tv           = (p) => <Icon {...p}><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></Icon>;
    const Smartphone   = (p) => <Icon {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></Icon>;
    const Monitor      = (p) => <Icon {...p}><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></Icon>;
    const Shield       = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>;
    const Zap          = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
    const Globe        = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
    const Share2       = (p) => <Icon {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></Icon>;
    const Code         = (p) => <Icon {...p}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></Icon>;
    const Activity     = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
    const HelpCircle   = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
    const Info         = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const Settings     = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
    const Magnet       = (p) => <Icon {...p}><path d="M6 15A6 6 0 0 0 6 3a6 6 0 0 0 0 12z" fill="none"/><path d="M6 3v4a2 2 0 0 0 4 0V3"/><line x1="6" y1="19" x2="6" y2="15"/><line x1="10" y1="19" x2="10" y2="14"/></Icon>;
    const Columns      = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="18"/></Icon>;
    const RadioTower   = (p) => <Icon {...p}><path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"/><path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"/><circle cx="12" cy="9" r="2"/><path d="M16.2 4.8c2 2 2.26 5.11.6 7.4"/><path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"/><line x1="12" y1="9" x2="12" y2="21"/></Icon>;

    /* ─── Custom SVG Icons ────────────────────────────────────────── */
    const ZuulIcon = ({ size=44, color='#E50914' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <path d="M 6 38 L 6 22 Q 6 5 22 5 Q 38 5 38 22 L 38 38" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
        <rect x="15" y="26" width="14" height="12" rx="1" fill="none" stroke={color} strokeWidth="1.5" opacity="0.8"/>
        <circle cx="26" cy="32" r="1.2" fill={color} opacity="0.8"/>
        <text x="22" y="22" textAnchor="middle" fill={color} fontSize="8" fontWeight="900">Z</text>
      </svg>
    );

    const HystrixIcon = ({ size=44, color='#00C6E0' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="18" fill="none" stroke={color} strokeWidth="1.5" strokeDasharray="4 2" opacity="0.4"/>
        <path d="M 11 22 L 16 22 L 19 13 L 25 31 L 28 22 L 33 22" stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="10" cy="22" r="2.5" fill={color}/>
        <circle cx="34" cy="22" r="2.5" fill={color}/>
        <path d="M 26 10 L 32 4 M 32 4 L 38 10" stroke="#EF4444" strokeWidth="2" strokeLinecap="round" opacity="0.9"/>

    const EurekaIcon = ({ size=44, color='#FF9900' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <circle cx="20" cy="19" r="12" fill="none" stroke={color} strokeWidth="1.5"/>
        <circle cx="20" cy="19" r="6" fill="none" stroke={color} strokeWidth="1" opacity="0.6"/>
        <circle cx="20" cy="19" r="2.5" fill={color}/>
        <line x1="20" y1="19" x2="28" y2="10" stroke={color} strokeWidth="2" strokeLinecap="round" opacity="0.9"/>
        <line x1="30" y1="30" x2="26" y2="26" stroke={color} strokeWidth="3" strokeLinecap="round"/>
        <text x="22" y="42" textAnchor="middle" fill={color} fontSize="5.5" fontWeight="700" opacity="0.7">EUREKA</text>
      </svg>
    );

    const RibbonIcon = ({ size=44, color='#6DB33F' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <circle cx="9" cy="22" r="5" fill="none" stroke={color} strokeWidth="2"/>
        <circle cx="35" cy="10" r="4" fill={color} opacity="0.85"/>
        <circle cx="35" cy="22" r="4" fill={color} opacity="0.85"/>
        <circle cx="35" cy="34" r="4" fill={color} opacity="0.85"/>
        <line x1="14" y1="22" x2="31" y2="10" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="14" y1="22" x2="31" y2="22" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <line x1="14" y1="22" x2="31" y2="34" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
        <text x="22" y="44" textAnchor="middle" fill={color} fontSize="5.5" fontWeight="700" opacity="0.7">RIBBON</text>
      </svg>
    );

    const FalcorIcon = ({ size=44, color='#764ABC' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="11" r="7" fill={color} opacity="0.85"/>
        <circle cx="9"  cy="35" r="5.5" fill={color} opacity="0.7"/>
        <circle cx="35" cy="35" r="5.5" fill={color} opacity="0.7"/>
        <line x1="22" y1="18" x2="9"  y2="29.5" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="22" y1="18" x2="35" y2="29.5" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="14.5" y1="35" x2="29.5" y2="35" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeDasharray="3 2"/>
        <text x="22" y="15" textAnchor="middle" fill="white" fontSize="7" fontWeight="900">F</text>
      </svg>
    );

    const DGSIcon = ({ size=44, color='#E10098' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <rect x="2" y="7" width="40" height="30" rx="4" fill="#1a0010" stroke={color} strokeWidth="1.5"/>
        <text x="22" y="20" textAnchor="middle" fill={color} fontSize="10" fontWeight="900" letterSpacing="1">DGS</text>
        <text x="22" y="30" textAnchor="middle" fill="rgba(225,0,152,0.65)" fontSize="5.5" fontWeight="700">Domain Graph Service</text>
        <line x1="2"  y1="23" x2="7"  y2="23" stroke={color} strokeWidth="1.5"/>
        <line x1="37" y1="23" x2="42" y2="23" stroke={color} strokeWidth="1.5"/>
      </svg>
    );

    const ApolloGatewayIcon = ({ size=44, color='#311C87' }) => (
      <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="19" fill={color} opacity="0.95"/>
        <circle cx="22" cy="22" r="9" fill="none" stroke="white" strokeWidth="2"/>
        <circle cx="22" cy="22" r="3.5" fill="white"/>
        <line x1="22" y1="3"  x2="22" y2="13" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        <line x1="22" y1="31" x2="22" y2="41" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        <line x1="3"  y1="22" x2="13" y2="22" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
        <line x1="31" y1="22" x2="41" y2="22" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.6"/>
      </svg>
    );

    /* ─── Global Styles ───────────────────────────────────────────── */
    const globalStyles = `
      @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2,0.8,0.2,1) both; }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
      @keyframes eraGlow { 0%,100%{box-shadow:0 0 0 rgba(229,9,20,0)} 50%{box-shadow:0 0 40px 8px var(--glow)} }
      @keyframes eraIn { 0%{transform:scale(0.95);opacity:0} 70%{transform:scale(1.01);opacity:1} 100%{transform:scale(1);opacity:1} }
      @keyframes dataFlow { 0%{stroke-dashoffset:100;opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{stroke-dashoffset:0;opacity:0} }
      @keyframes arrowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
      @keyframes screenGlow { 0%,100%{opacity:0.2} 50%{opacity:0.5} }
      @keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
      .era-active { animation: eraIn 0.55s cubic-bezier(0.2,0.8,0.2,1) both; }
      .data-flow  { stroke-dasharray: 10 90; animation: dataFlow 2.2s ease-in-out infinite; }
      .float-up   { animation: floatUp 3s ease-in-out infinite; }
      .connect-pulse { animation: arrowPulse 1.8s ease-in-out infinite; }
      .scrollbar-hide::-webkit-scrollbar { display:none; }
      .scrollbar-hide { -ms-overflow-style:none; scrollbar-width:none; }
      .animate-fadeup { animation: fadeInUp 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards; }
    `;

    /* ─── Contexts ────────────────────────────────────────────────── */
    const MagneticContext = createContext(false);
    const WhatIsContext   = createContext(false);

    /* ─── MagneticNode ────────────────────────────────────────────── */
    const MagneticNode = ({ children, className='' }) => {
      const isEnabled = useContext(MagneticContext);
      const [pos, setPos] = useState({ x:0, y:0 });
      const ref = useRef(null);
      const onMove = (e) => {
        if (!isEnabled || !ref.current) return;
        const r = ref.current.getBoundingClientRect();
        setPos({ x:(e.clientX-r.left-r.width/2)*0.25, y:(e.clientY-r.top-r.height/2)*0.25 });
      };
      useEffect(() => { if (!isEnabled) setPos({x:0,y:0}); }, [isEnabled]);
      return (
        <div ref={ref} className={`inline-block ${className}`} onMouseMove={onMove} onMouseLeave={() => setPos({x:0,y:0})}
          style={{ transform:`translate(${pos.x}px,${pos.y}px)`, transition: pos.x===0?'transform 0.5s cubic-bezier(0.2,0.8,0.2,1)':'none', willChange:'transform' }}>
          {children}
        </div>
      );
    };

    /* ─── RealIcon ────────────────────────────────────────────────── */
    const RealIcon = ({ slug, color='white', name, desc, tooltipTitle, hideLabel, size=44, className='', fallbackIcon: Fallback }) => {
      const [err, setErr] = useState(false);
      const wtIs = useContext(WhatIsContext);
      const c = color.startsWith('#') ? color : `#${color}`;
      return (
        <MagneticNode className={className}>
          <div className="flex flex-col items-center justify-center gap-1 group cursor-pointer relative">
            {wtIs && desc && (
              <div className="absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-52 p-3 bg-gray-900/95 backdrop-blur-md text-gray-300 text-[11px] leading-relaxed text-center rounded-xl border border-gray-700 shadow-2xl opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none z-50 scale-95 group-hover:scale-100">
                <div className="font-bold text-white text-xs mb-1 tracking-wider">{tooltipTitle||name}</div>
                {desc}
                <div className="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-gray-700"/>
              </div>
            )}
            <div className="relative flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:drop-shadow-[0_0_14px_rgba(255,255,255,0.4)]">
              {!err && slug ? (
                <img src={`https://cdn.simpleicons.org/${slug}/${color.replace('#','')}`} alt={name} style={{width:size,height:size}} className="object-contain pointer-events-none" onError={() => setErr(true)} />
              ) : Fallback ? (
                <Fallback size={size} color={c} />
              ) : (
                <div style={{width:size,height:size,borderColor:c}} className="bg-gray-800/80 rounded flex items-center justify-center border shadow-lg">
                  <span className="text-xs font-black" style={{color:c}}>{(tooltipTitle||name||'').substring(0,2).toUpperCase()}</span>
                </div>
              )}
            </div>
            {name && !hideLabel && (
              <span className="text-[10px] font-semibold tracking-wide text-gray-300 group-hover:text-white transition-colors text-center leading-tight mt-1">{name}</span>
            )}
          </div>
        </MagneticNode>
      );
    };

    /* ─── Concepts Data (Browse view) ─────────────────────────────── */
    const CONCEPTS_DATA = [
      { category: "API Gateway & Routing", icon: <Shield size={20}/>, color: "text-red-400", items: [
        { name:"Netflix Zuul",  fallbackIcon: ZuulIcon,  color:"E50914", desc:"Netflix's programmable API gateway. Sits at the edge and handles auth, routing, rate limiting, and SSL termination for all inbound traffic across every device type." },
        { name:"Ribbon",        fallbackIcon: RibbonIcon, color:"6DB33F", desc:"Client-side load balancer baked into Zuul. Distributes traffic evenly across healthy instances of each microservice without a centralised proxy hop." },
        { name:"Netflix Eureka",fallbackIcon: EurekaIcon, color:"FF9900", desc:"Service registry and discovery server. Every microservice registers its address here at startup so other services can find it dynamically without hardcoded URLs." },
      ]},
      { category: "Resilience Patterns", icon: <Zap size={20}/>, color: "text-cyan-400", items: [
        { name:"Hystrix",        fallbackIcon: HystrixIcon, color:"00C6E0", desc:"Netflix's circuit breaker library. When a downstream service is slow or failing, Hystrix opens the circuit — fails fast, returns a fallback, and prevents cascading failures." },
        { name:"Turbine",        fallbackIcon: Activity,   color:"60A5FA", desc:"Aggregates streaming Hystrix metrics from hundreds of services into one dashboard view — the control room for circuit breaker health across the whole fleet." },
        { name:"Chaos Monkey",   slug:"netflix",            color:"E50914", desc:"The original chaos engineering tool — randomly kills production services during business hours. Forces the system to be resilient by design rather than accident." },
      ]},
      { category: "Query Languages", icon: <Code size={20}/>, color: "text-pink-400", items: [
        { name:"GraphQL",  slug:"graphql",           color:"E10098", desc:"A declarative API query language. Clients ask for exactly what they need in a single request — no over-fetching, no under-fetching, no versioning headaches." },
        { name:"Falcor",   fallbackIcon: FalcorIcon, color:"764ABC", desc:"Netflix's homegrown JSON graph model. Before GraphQL, clients fetched paths in a virtual data graph — the same idea, but proprietary to Netflix and built in JavaScript." },
        { name:"REST",     fallbackIcon: Globe,      color:"22C55E", desc:"The original vehicle: HTTP verbs (GET, POST, PUT, DELETE) with resource-based URLs. Netflix started here and every era builds on understanding its limitations." },
      ]},
      { category: "GraphQL Frameworks", icon: <Share2 size={20}/>, color: "text-purple-400", items: [
        { name:"Netflix DGS",      fallbackIcon: DGSIcon,          color:"E10098", desc:"Domain Graph Service — Netflix's open-source Spring Boot framework for building GraphQL subgraphs with Federation, data loaders, and operational instrumentation baked in." },
        { name:"Apollo Federation",fallbackIcon: ApolloGatewayIcon,color:"311C87", desc:"Architectural spec that lets hundreds of teams publish independent GraphQL schemas (subgraphs). A gateway federates them into one unified API without centralised schema ownership." },
        { name:"Apollo Studio",    slug:"apollographql",            color:"311C87", desc:"Cloud platform for managing the federated graph — schema registry, change impact analysis, field-level performance metrics, and safe schema evolution tooling." },
        { name:"Spring Boot",      slug:"springboot",               color:"6DB33F", desc:"The Java framework backing every Netflix DGS microservice. Provides auto-configuration, embedded Tomcat, and production-ready defaults so teams ship subgraphs fast." },
      ]},
      { category: "Architecture Patterns", icon: <GitBranch size={20}/>, color: "text-amber-400", items: [
        { name:"BFF Pattern",    fallbackIcon: Layers,           color:"38BDF8", desc:"Backend-for-Frontend: a dedicated API adapter per client type (iOS, Android, Web, Smart TV). Each device gets a response shaped exactly for its needs without polluting the core API." },
        { name:"API Gateway",    fallbackIcon: Server,           color:"94A3B8", desc:"Single entry point for all client traffic. Handles cross-cutting concerns — auth, rate limiting, logging, retries — so microservices don't each need to implement them." },
        { name:"Federation",     fallbackIcon: ApolloGatewayIcon,color:"A78BFA", desc:"Distributed schema composition. Each team owns a slice of the GraphQL schema (subgraph). The gateway stitches them together without creating a distributed monolith." },
        { name:"Circuit Breaker",fallbackIcon: HystrixIcon,      color:"00C6E0", desc:"Stops calling a failing service and returns a pre-defined fallback instead. After a timeout it sends a test request — if healthy, the circuit closes again." },
      ]},
    ];

    /* ─── Story Steps ─────────────────────────────────────────────── */
    // Canvas: 3200×800 px. Canvas center-x = 1600.
    // Era layout: Era1(x=20,w=520,cx=280), Era2(x=600,w=520,cx=860),
    //             Era3(x=1180,w=650,cx=1505), Era4(x=1880,w=520,cx=2140),
    //             Era5(x=2450,w=650,cx=2775)
    // cam.x: positive = shift canvas right (shows left content); neg = shows right content
    const STORY_STEPS = [
      { id:'overview',   active:['era1','era2','era3','era4','era5'], cam:{x:0,    y:0, scale:0.36}, text:"Netflix built 5 completely different API architectures in 15 years. Each time, an old approach broke at scale. Here's the full evolution." },
      { id:'monolith',   active:['era1'],                             cam:{x:1320, y:0, scale:0.85}, text:"2008 — It started as a 20TB Oracle monolith. One codebase, one database, one catastrophic deploy cycle. Any change? Ship absolutely everything." },
      { id:'directapi',  active:['era2'],                             cam:{x:740,  y:0, scale:0.85}, text:"2012 — The move to AWS shattered the monolith into microservices. Freedom! But clients now made 10+ independent service calls per page load. Chatty, slow, fragile." },

      { id:'federation', active:['era5'],                             cam:{x:-1175,y:0, scale:0.85}, text:"Apollo Federation lets each team publish their own GraphQL subgraph independently. The Studio Edge Gateway stitches all schemas together — one API, zero coordination overhead." },

      { id:'finale',     active:['era1','era2','era3','era4','era5'], cam:{x:0,    y:0, scale:0.36}, text:"From a 20TB Oracle monolith to a globally federated GraphQL graph. 15 years, 5 architectures, billions of daily API calls — all to deliver your perfect next recommendation." },

    /* ─── Story / Timeline View ───────────────────────────────────── */
    function StoryView({ onFinish }) {
      const [idx, setIdx] = useState(0);
      const step = STORY_STEPS[idx];
      const next = () => setIdx(i => Math.min(i+1, STORY_STEPS.length-1));
      const prev = () => setIdx(i => Math.max(i-1, 0));
      const txStyle = {
        transform: `translate3d(calc(-50% + ${step.cam.x}px), calc(-50% + ${step.cam.y}px), 0) scale(${step.cam.scale})`,
        transition: 'transform 1.1s cubic-bezier(0.4,0,0.2,1)',
      };
      const ERA_IDS  = ['era1','era2','era3','era4','era5'];
      const ERA_CX   = [280, 860, 1505, 2140, 2775];
      const ERA_COLORS= ['#9B1C1C','#1E3A8A','#92400E','#581C87','#831843'];
      const eraTitle = step.active.length === 1 ? {
        era1:'01 · Monolith', era2:'02 · Direct REST', era3:'03 · API Gateway + BFF',
        era4:'04 · Falcor', era5:'05 · GraphQL Federation'
      }[step.active[0]] : null;
      return (
        <div className="flex-1 flex flex-col h-screen overflow-hidden bg-[#0a0a0a]">

            <div className="flex items-center gap-2">
              {eraTitle
                ? <span className="text-xs font-black tracking-[0.25em] text-[#E50914] uppercase">{eraTitle}</span>
                : <span className="text-xs font-semibold tracking-[0.2em] text-gray-600 uppercase">All Eras</span>}
            </div>
            <div className="flex items-center gap-1.5">
              {STORY_STEPS.map((s,i) => (
                <button key={s.id} onClick={() => setIdx(i)}
                  className={`rounded-full transition-all duration-300 ${i===idx ? 'w-6 h-2 bg-[#E50914]' : 'w-2 h-2 bg-gray-700 hover:bg-gray-500'}`}/>
              ))}
            </div>
          </header>

          {/* Canvas */}
          <main className="flex-1 relative overflow-hidden" style={{height:'73vh'}}>
            <div className="absolute top-1/2 left-1/2 w-[3200px] h-[800px] origin-center" style={txStyle}>

              <svg className="absolute inset-0 pointer-events-none" width="3200" height="800">
                {/* Backbone */}
                <line x1="60" y1="400" x2="3140" y2="400" stroke="#1a1a1a" strokeWidth="2"/>
                {/* Era dots */}
                {ERA_IDS.map((id,i) => (
                  <circle key={id} cx={ERA_CX[i]} cy={400} r={isAct(step,id) ? 7 : 3.5}
                    fill={ERA_COLORS[i]} opacity={isAct(step,id) ? 1 : 0.35}
                    className="transition-all duration-700"/>
                ))}
                {/* Transition particles — appear when the DESTINATION era is active */}
                {isAct(step,'era2') && <path d="M 540 400 L 600 400" fill="none" stroke="#3B82F6" strokeWidth="2" className="data-flow"/>}
                {isAct(step,'era3') && <path d="M 1120 400 L 1180 400" fill="none" stroke="#F59E0B" strokeWidth="2" className="data-flow" style={{animationDelay:'0.3s'}}/>}
                {isAct(step,'era4') && <path d="M 1830 400 L 1880 400" fill="none" stroke="#A855F7" strokeWidth="2" className="data-flow" style={{animationDelay:'0.6s'}}/>}
                {isAct(step,'era5') && <path d="M 2400 400 L 2450 400" fill="none" stroke="#EC4899" strokeWidth="2" className="data-flow" style={{animationDelay:'0.9s'}}/>}
              </svg>

              {/* ── Era 1: Monolith ──  x=20, w=520 */}
              <EraBlock id="era1" num="01" title="Monolith" dates="pre-2012"
                accentColor="#9B1C1C" glowColor="rgba(155,28,28,0.28)"
                className="w-[520px] h-[710px] left-[20px] top-[45px]"
                problem="Every deploy = ship everything. Teams block each other constantly."
                pType="bad" step={step}>
                <MonolithDiagram active={isAct(step,'era1')}/>
              </EraBlock>

              {/* ── Era 2: Direct REST ──  x=600, w=520 */}
              <EraBlock id="era2" num="02" title="Direct REST" dates="2012 – 2015"
                accentColor="#1E3A8A" glowColor="rgba(30,58,138,0.28)"

                accentColor="#92400E" glowColor="rgba(146,64,14,0.28)"
                className="w-[650px] h-[710px] left-[1180px] top-[45px]"
                problem="Per-device BFF adapters required mountains of custom orchestration code."
                pType="neutral" step={step}>
                <GatewayDiagram active={isAct(step,'era3')} spotlight={step.id}/>

              {/* ── Era 4: Falcor ──  x=1880, w=520 */}

                accentColor="#581C87" glowColor="rgba(88,28,135,0.28)"

            </div>

              <button onClick={next} disabled={idx===STORY_STEPS.length-1} className="p-3 rounded-full bg-gray-800 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all hover:scale-110">
                <ChevronRight className="w-6 h-6"/>
              </button>
            </div>
          </footer>
        </div>
      );
    }

    /* ─── EraBlock ────────────────────────────────────────────────── */
    function EraBlock({ id, num, title, dates, accentColor, glowColor, className, problem, pType, step, children }) {
      const active = isAct(step, id);
      return (
        <div className={`absolute rounded-2xl transition-all duration-1000 flex flex-col overflow-hidden ${active ? 'era-active' : ''} ${className}`}
          style={{
            border: `1.5px solid ${active ? accentColor : '#222'}`,
            background: active ? `linear-gradient(155deg,${accentColor}18 0%,#0d0d0d 65%)` : '#0d0d0d',
            boxShadow: active ? `0 0 50px ${glowColor}, inset 0 0 80px ${accentColor}08` : 'none',
            opacity: active ? 1 : 0.18,
            filter: active ? 'none' : 'grayscale(1)',
          }}>
          {/* Header */}
          <div className="px-6 pt-5 pb-4 border-b shrink-0" style={{borderColor:`${accentColor}35`}}>

          {/* Diagram area */}
          <div className="flex-1 flex items-center justify-center px-4 py-2 min-h-0">

              pType==='bad'     ? 'bg-red-950/40 border-red-800/40 text-red-300' :
              pType==='neutral' ? 'bg-amber-950/35 border-amber-700/35 text-amber-300' :
                                 'bg-emerald-950/35 border-emerald-700/35 text-emerald-300'

    /* ─── Era 1: Monolith Diagram ─────────────────────────────────── */
    function MonolithDiagram({ active }) {

      return (

            <div className="rounded-2xl border-2 p-4 w-[200px]"
              style={{borderColor:active?'#9B1C1C':'#2a2a2a',background:active?'rgba(127,29,29,0.18)':'rgba(18,18,18,0.9)'}}>
              <div className="text-[8px] font-black tracking-[0.35em] uppercase text-center mb-3 text-red-500/80">MONOLITH</div>
              {['User Service','Content Service','Recommendations','Billing','Search','Auth'].map((s,i) => (
                <div key={i} className="flex items-center gap-2 py-[5px] border-b border-gray-800/50 last:border-0">
                  <div className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:active?'#7F1D1D':'#333'}}/>
                  <span className="text-[10px] text-gray-400">{s}</span>
                </div>
              ))}
              <div className="mt-3 pt-2 border-t border-red-900/40 flex items-center gap-2">
                <Database size={14} className="text-orange-500"/>
                <span className="text-[9px] font-bold text-orange-400">20TB Oracle DB</span>
              </div>
            </div>
          </div>
          {/* Deploy warning */}
          <div className="flex items-center gap-2 bg-red-950/25 border border-red-800/30 rounded-xl px-4 py-2">
            <span className="text-[10px] text-red-300/90 font-semibold">One change → full deploy of all 6 services 🐌</span>
          </div>
          {/* Tech row */}
          <div className="flex items-center gap-5">
            <RealIcon name="Oracle" fallbackIcon={Database} color="F80000" size={30} desc="The massive relational database holding all of Netflix's data in a single 20TB instance before the AWS migration." hideLabel/>
            <span className="text-[10px] text-gray-500">Oracle DB</span>
            <RealIcon slug="java" color="007396" name="Java" size={30} desc="Primary language of the Netflix monolith — all business logic, all services, one compile-and-deploy unit." hideLabel/>
            <span className="text-[10px] text-gray-500">Java</span>
          </div>
        </div>
      );
    }

    /* ─── Era 2: Direct REST Diagram ─────────────────────────────── */
    function DirectRESTDiagram({ active }) {
      const services = ['Accounts','Ratings','Recs','Metadata','Billing','Search'];
      const ccols = ['#EF4444','#F97316','#3B82F6','#14B8A6'];
      const ac = active ? '#3B82F6' : '#333';
      return (
        <div className="w-full flex flex-col items-center gap-4">
          <div className="flex items-center gap-3 justify-center">
            {/* Clients */}
            <div className="flex flex-col gap-3.5 items-end">
              {[<Tv size={20}/>,<Smartphone size={17}/>,<Monitor size={18}/>,<RadioTower size={18}/>].map((icon,i) => (
                <div key={i} style={{color:active?ccols[i]:'#444'}}>{icon}</div>
              ))}
            </div>
            {/* Chaos mesh arrows */}
            <svg width="100" height="130">
              {services.flatMap((_,si) =>
                ccols.map((_,ci) => {
                  const y1 = ci*28+14;
                  const y2 = si*19+9;
                  return <line key={`${ci}-${si}`} x1="0" y1={y1} x2="95" y2={y2}
                    stroke={active?ccols[ci]:'#2a2a2a'} strokeWidth="1.2" opacity={active?0.45:0.4} strokeLinecap="round"/>;
                })
              )}
            </svg>
            {/* Services list */}
            <div className="flex flex-col gap-1.5">
              {services.map((s,i) => (
                <div key={i} className="flex items-center gap-1.5 border rounded-lg px-2 py-1 text-[9px] font-semibold"
                  style={{borderColor:ac+'50',color:active?'#93C5FD':'#555',background:active?'rgba(30,58,138,0.15)':'rgba(20,20,20,0.8)'}}>
                  <Server size={11} style={{color:ac}}/>{s}
                </div>
              ))}
            </div>
          </div>
          <div className="text-[10px] text-blue-400/60 italic text-center">Every client calls every service directly — N×M connections</div>
          <div className="flex items-center gap-5">
            <RealIcon name="REST" fallbackIcon={Globe} color="22C55E" size={30} desc="HTTP verbs (GET, POST, PUT, DELETE) — used for all client-to-microservice calls. Simple, but creates chatty N×M communication patterns at Netflix scale." hideLabel/>
            <span className="text-[10px] text-gray-500">REST HTTP</span>
            <RealIcon slug="java" color="007396" name="Java" size={30} desc="Each microservice is an independent Java app — freely deployable, but publicly accessible to all client types." hideLabel/>
            <span className="text-[10px] text-gray-500">Java</span>
          </div>
        </div>
      );
    }

    /* ─── Era 3: API Gateway Diagram ─────────────────────────────── */
    function GatewayDiagram({ active, spotlight }) {
      const ac = active ? '#F59E0B' : '#333';
      const hystrixHL = spotlight === 'hystrix';
      return (
        <div className="w-full flex flex-col items-center gap-4">
          <div className="flex items-center gap-3 justify-center w-full">
            {/* BFF adapters per device */}
            <div className="flex flex-col gap-2 shrink-0">
              {[['TV','#EF4444'],['iOS','#F97316'],['Web','#3B82F6'],['TV BFF','#EF4444'],['iOS BFF','#F97316'],['Web BFF','#3B82F6']].slice(0,3).concat([['TV BFF','#EF4444'],['iOS BFF','#F97316'],['Web BFF','#3B82F6']]).slice(0,3).map(([l,c],i) => (
                <div key={i} className="border rounded-lg px-2 py-1 text-[9px] font-bold tracking-wide"
                  style={{borderColor:c+'55',color:c,background:c+'12'}}>
                  {['TV','iOS','Web'][i]} BFF
                </div>
              ))}
            </div>
            {/* Arrow to gateway */}
            <svg width="28" height="76">
              <path d="M 0 12 L 20 38 L 0 64" fill="none" stroke={ac} strokeWidth="2" strokeLinecap="round"/>
              <polygon points="14,34 26,38 14,42" fill={ac}/>
            </svg>
            {/* Zuul Gateway */}
            <div className={`rounded-2xl border-2 p-3.5 flex flex-col items-center gap-2.5 w-[118px] transition-all duration-500 ${hystrixHL?'opacity-30':''}`}
              style={{borderColor:active?'#F59E0B':'#2a2a2a',background:active?'rgba(120,53,15,0.2)':'rgba(15,15,15,0.9)'}}>
              <RealIcon name="Zuul" fallbackIcon={ZuulIcon} color="E50914" size={34} desc="Netflix's programmable API gateway — single entry point for all client traffic." hideLabel/>
              <div className="text-[8px] font-black tracking-[0.2em] text-amber-400 text-center">ZUUL GATEWAY</div>
              {['Rate Limit','Auth','Routing','SSL'].map(f => (
                <div key={f} className="text-[8px] text-gray-400 bg-gray-900/60 rounded px-2 py-0.5 border border-gray-800/60 w-full text-center">{f}</div>
              ))}
            </div>
            {/* Arrow to services */}
            <svg width="26" height="76">
              <line x1="0" y1="38" x2="18" y2="38" stroke={ac} strokeWidth="2"/>
              <polygon points="12,34 24,38 12,42" fill={ac}/>
            </svg>
            {/* Microservices */}
            <div className="flex flex-col gap-1.5 shrink-0">
              {['Accounts','Ratings','Recs','Content','Search'].map((s,i) => (
                <div key={i} className="border rounded px-2 py-1 text-[9px] font-semibold"
                  style={{borderColor:ac+'40',color:active?'#FDE68A':'#555',background:active?'rgba(120,53,15,0.12)':'rgba(15,15,15,0.9)'}}>
                  {s}
                </div>
              ))}
            </div>
          </div>
          {/* Hystrix / Ribbon / Eureka */}
          <div className={`flex items-center gap-4 transition-all duration-500 ${hystrixHL?'scale-110':''}`}>
            <RealIcon name="Hystrix" fallbackIcon={HystrixIcon} color="00C6E0" size={32} desc="Circuit breaker — stops cascading failures by opening the circuit when a service degrades." hideLabel/>
            <RealIcon name="Ribbon"  fallbackIcon={RibbonIcon}  color="6DB33F" size={32} desc="Client-side load balancer — spreads traffic across healthy service instances." hideLabel/>
            <RealIcon name="Eureka"  fallbackIcon={EurekaIcon}  color="FF9900" size={32} desc="Service registry — every service registers here so others can find it." hideLabel/>
          </div>
          {hystrixHL && (
            <div className="text-[11px] text-cyan-300 font-semibold text-center bg-cyan-950/30 border border-cyan-800/35 rounded-xl px-3 py-2 w-full mt-1 animate-fadeup">
              ⚡ Hystrix: open circuit on failure · return fallback · prevent cascade
            </div>
          )}
        </div>
      );
    }

    /* ─── Era 4: Falcor Diagram ───────────────────────────────────── */
    function FalcorDiagram({ active }) {
      const ac = active ? '#A855F7' : '#333';
      return (
        <div className="w-full flex flex-col items-center gap-5">
          <div className="flex items-center gap-4 justify-center">
            {/* Client with path syntax */}
            <div className="flex flex-col items-center gap-2">
              <Monitor size={26} style={{color:active?'#A855F7':'#444'}}/>
              <div className="bg-gray-900/90 border border-purple-800/45 rounded-xl p-2.5 text-[8px] font-mono text-purple-300 w-[108px] leading-relaxed">
                <div className="text-purple-500">model.get(</div>
                <div className="ml-2">"user.name",</div>
                <div className="ml-2">"ratings[0..4]"</div>
                <div className="text-purple-500">)</div>
              </div>
            </div>
            {/* Arrow */}
            <svg width="48" height="42">
              <line x1="0" y1="21" x2="40" y2="21" stroke={ac} strokeWidth="2"/>
              <polygon points="34,17 46,21 34,25" fill={ac}/>
            </svg>
            {/* Falcor graph */}
            <div className="flex flex-col items-center gap-2">
              <RealIcon name="Falcor" fallbackIcon={FalcorIcon} color="764ABC" size={46} desc="Netflix's JSON graph model — clients fetch exactly the data paths they need in one round trip. Open-sourced in 2015." hideLabel/>
              <div className="text-[8px] font-black tracking-[0.18em] text-purple-400">JSON GRAPH MODEL</div>
              <svg width="130" height="88">
                <circle cx="65" cy="20" r="12" fill="rgba(118,74,188,0.25)" stroke="#764ABC" strokeWidth="1.5"/>
                <circle cx="28" cy="68" r="10" fill="rgba(118,74,188,0.25)" stroke="#764ABC" strokeWidth="1.5"/>
                <circle cx="102" cy="68" r="10" fill="rgba(118,74,188,0.25)" stroke="#764ABC" strokeWidth="1.5"/>
                <line x1="65" y1="32" x2="28"  y2="58" stroke="#764ABC" strokeWidth="1.5"/>
                <line x1="65" y1="32" x2="102" y2="58" stroke="#764ABC" strokeWidth="1.5"/>
                <line x1="38" y1="68" x2="92"  y2="68" stroke="#764ABC" strokeWidth="1.2" strokeDasharray="3 2"/>
                <text x="65" y="24"  textAnchor="middle" fill="white" fontSize="7.5">user</text>
                <text x="28" y="72"  textAnchor="middle" fill="white" fontSize="6.5">ratings</text>
                <text x="102" y="72" textAnchor="middle" fill="white" fontSize="6.5">content</text>
              </svg>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <RealIcon name="Falcor"    fallbackIcon={FalcorIcon} color="764ABC" size={28} desc="Netflix's open-source JSON graph data fetching library — the precursor to GraphQL at Netflix." hideLabel/>
            <span className="text-[10px] text-gray-500">Falcor</span>
            <RealIcon slug="netflix"   color="E50914" name="Netflix" size={28} desc="Falcor was built and open-sourced by Netflix in 2015 — solving Relay/GraphQL-style problems before GraphQL was mainstream." hideLabel/>
            <span className="text-[10px] text-gray-500">Netflix OSS</span>
            <RealIcon slug="javascript" color="F7DF1E" name="JavaScript" size={28} desc="Falcor runs in JavaScript on both client (browser/native) and server (Node.js router)." hideLabel/>
            <span className="text-[10px] text-gray-500">JavaScript</span>
          </div>
        </div>
      );
    }

    /* ─── Era 5: GraphQL Federation Diagram ──────────────────────── */
    function GraphQLDiagram({ active, spotlight }) {
      const ac = active ? '#EC4899' : '#333';
      const fedHL  = spotlight === 'federation';
      const dgsHL  = spotlight === 'dgs';
      const subgraphs = [['Users','#3B82F6'],['Titles','#10B981'],['Ratings','#F59E0B']];
      return (
        <div className="w-full flex flex-col items-center gap-4">
          <div className="flex items-center gap-2 justify-center w-full">
            {/* Client */}
            <div className="flex flex-col items-center gap-2 shrink-0">
              <Monitor size={24} style={{color:active?'#F472B6':'#444'}}/>
              <div className="bg-gray-900/90 border border-pink-800/40 rounded-xl p-2 text-[7.5px] font-mono text-pink-300 w-[82px] leading-relaxed">
                <div className="text-pink-500">query {'{'}</div>
                <div className="ml-2">user {'{'}</div>
                <div className="ml-4">name</div>
                <div className="ml-4">ratings</div>
                <div className="ml-2">{'}'}</div>
                <div className="text-pink-500">{'}'}</div>
              </div>
            </div>
            {/* Arrow */}
            <svg width="26" height="36">
              <line x1="0" y1="18" x2="18" y2="18" stroke={ac} strokeWidth="1.5"/>
              <polygon points="12,14 24,18 12,22" fill={ac}/>
            </svg>
            {/* Apollo Gateway */}
            <div className={`flex flex-col items-center gap-2 rounded-2xl border px-3 py-3 w-[120px] transition-all duration-500 shrink-0 ${fedHL?'scale-105':''}`}
              style={{borderColor:active?'#9D174D':'#222',background:active?'rgba(131,24,67,0.2)':'rgba(12,12,12,0.9)',
                boxShadow:fedHL&&active?'0 0 24px rgba(236,72,153,0.4)':undefined}}>
              <RealIcon name="Apollo" slug="apollographql" color="311C87" size={30} desc="Apollo Federation Gateway — stitches together multiple GraphQL subgraphs into one unified API at runtime." hideLabel/>
              <div className="text-[7.5px] font-black text-center text-pink-400 tracking-[0.12em]">STUDIO EDGE</div>
              <div className="text-[7px] text-gray-500 text-center leading-snug">Federation Gateway</div>
            </div>
            {/* Fan-out */}
            <svg width="28" height="100">
              <line x1="0" y1="50" x2="22" y2="18" stroke={ac} strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="0" y1="50" x2="22" y2="50" stroke={ac} strokeWidth="1.5" strokeLinecap="round"/>
              <line x1="0" y1="50" x2="22" y2="82" stroke={ac} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
            {/* DGS Subgraphs */}
            <div className={`flex flex-col gap-2 transition-all duration-500 ${dgsHL?'scale-105':''}`}>
              {subgraphs.map(([label,c],i) => (
                <div key={i} className="flex flex-col items-center gap-1 rounded-xl border px-3 py-1.5 w-[92px]"
                  style={{borderColor:`${c}45`,background:`${c}10`,
                    boxShadow:dgsHL&&active?`0 0 14px ${c}35`:undefined}}>
                  <div className="text-[8px] font-black tracking-wider" style={{color:c}}>{label} DGS</div>
                  <div className="text-[7px] text-gray-500">Spring Boot</div>
                </div>
              ))}
            </div>
          </div>
          <div className="flex items-center gap-4 flex-wrap justify-center">
            <RealIcon slug="graphql"     color="E10098" name="GraphQL"    size={28} desc="Industry-standard query language — replaced Falcor as Netflix's API contract with all clients." hideLabel/>
            <span className="text-[10px] text-gray-500">GraphQL</span>
            <RealIcon fallbackIcon={DGSIcon} color="E10098" name="DGS"    size={28} desc="Domain Graph Service — Netflix's open-source Spring Boot framework for GraphQL subgraphs." hideLabel/>
            <span className="text-[10px] text-gray-500">Netflix DGS</span>
            <RealIcon slug="apollographql" color="311C87" name="Apollo"   size={28} desc="Apollo Federation and Studio — the foundation of Netflix's federated GraphQL platform." hideLabel/>
            <span className="text-[10px] text-gray-500">Apollo</span>
            <RealIcon slug="springboot"  color="6DB33F" name="Spring Boot" size={28} desc="Java framework powering every DGS microservice in the Netflix stack." hideLabel/>
            <span className="text-[10px] text-gray-500">Spring Boot</span>
          </div>
        </div>
      );
    }

    /* ─── Mount ───────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NetflixAPIPortal/>);
  </script>
</body>
</html>
