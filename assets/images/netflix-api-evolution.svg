<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Netflix API Evolution">
  <defs>
    <linearGradient id="nae-bg" x1="0" y1="0" x2="360" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0404"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="nae-glow" cx="180" cy="110" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E50914" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E50914" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="220" fill="url(#nae-bg)"/>
  <rect width="360" height="220" fill="url(#nae-glow)"/>

  <!-- Subtle scan lines -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5">
    <line x1="0" y1="55"  x2="360" y2="55"/>
    <line x1="0" y1="110" x2="360" y2="110"/>
    <line x1="0" y1="165" x2="360" y2="165"/>
  </g>

  <!-- Left API topology cluster (decorative) -->
  <g fill="none" stroke="#E50914" stroke-opacity="0.28" stroke-width="1.2">
    <circle cx="32"  cy="58"  r="5"/>
    <circle cx="58"  cy="96"  r="4"/>
    <circle cx="38"  cy="143" r="5.5"/>
    <circle cx="76"  cy="178" r="3.5"/>
    <line x1="32" y1="58"  x2="58"  y2="96"/>
    <line x1="58" y1="96"  x2="38"  y2="143"/>
    <line x1="38" y1="143" x2="76"  y2="178"/>
  </g>
  <g fill="#E50914" fill-opacity="0.55">
    <circle cx="32"  cy="58"  r="2"/>
    <circle cx="58"  cy="96"  r="1.5"/>
    <circle cx="38"  cy="143" r="2"/>
    <circle cx="76"  cy="178" r="1.5"/>
  </g>

  <!-- Right API topology cluster (decorative) -->
  <g fill="none" stroke="#E50914" stroke-opacity="0.28" stroke-width="1.2">
    <circle cx="308" cy="46"  r="5"/>
    <circle cx="340" cy="92"  r="4"/>
    <circle cx="322" cy="143" r="5.5"/>
    <circle cx="288" cy="178" r="3.5"/>
    <line x1="308" y1="46"  x2="340" y2="92"/>
    <line x1="340" y1="92"  x2="322" y2="143"/>
    <line x1="322" y1="143" x2="288" y2="178"/>
  </g>
  <g fill="#E50914" fill-opacity="0.55">
    <circle cx="308" cy="46"  r="2"/>
    <circle cx="340" cy="92"  r="1.5"/>
    <circle cx="322" cy="143" r="2"/>
    <circle cx="288" cy="178" r="1.5"/>
  </g>

  <!-- Faint cross-wires hinting at microservice mesh -->
  <line x1="58"  y1="96"  x2="308" y2="46"  stroke="#E50914" stroke-opacity="0.07" stroke-width="0.6" stroke-dasharray="4,7"/>
  <line x1="38"  y1="143" x2="322" y2="143" stroke="#E50914" stroke-opacity="0.07" stroke-width="0.6" stroke-dasharray="4,7"/>
  <line x1="76"  y1="178" x2="288" y2="178" stroke="#E50914" stroke-opacity="0.07" stroke-width="0.6" stroke-dasharray="4,7"/>

  <!-- Netflix N logo — centered: translate(120,50) scale(5) → x=147–213, y=50–170 -->
  <g transform="translate(120,50) scale(5)">
    <path fill="#E50914" d="m5.398 0 8.348 23.602c2.346.059 4.856.398 4.856.398L10.113 0H5.398zm8.489 0v9.172l4.715 13.33V0h-4.715zM5.398 1.5V24c1.873-.225 2.81-.312 4.715-.398V14.83L5.398 1.5z"/>
  </g>

  <!-- "API" label — right of N, vertically centered in hero-safe zone (y=46–174) -->
  <text x="230" y="106"
    font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-weight="900" font-size="34" fill="#ffffff" opacity="0.94">API</text>
  <text x="232" y="128"
    font-family="Helvetica Neue,Helvetica,Arial,sans-serif"
    font-weight="300" font-size="9.5" fill="#8a8a8a" letter-spacing="3.5">EVOLUTION</text>

  <!-- 5-era dot timeline — within safe zone y=156 -->
  <line x1="232" y1="156" x2="306" y2="156" stroke="#E50914" stroke-opacity="0.4" stroke-width="0.8"/>
  <g fill="#E50914" fill-opacity="0.7">
    <circle cx="232" cy="156" r="2.8"/>
    <circle cx="250" cy="156" r="2.8"/>
    <circle cx="269" cy="156" r="2.8"/>
    <circle cx="287" cy="156" r="2.8"/>
    <circle cx="306" cy="156" r="2.8"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="213" width="360" height="7" fill="#E50914"/>
</svg>
