<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix System Design | Karthi's Design Book</title>
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for JSX transformation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a0a; }
    /* Hide Babel banner if any */
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      useState, useEffect, useCallback, useRef, createContext, useContext
    } = React;

    /* ─── Inline Lucide-style SVG icon components ─────────────────── */
    const Icon = ({ size = 24, strokeWidth = 2, className = '', fill = 'none', children, ...rest }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill={fill} stroke="currentColor" strokeWidth={strokeWidth}
           strokeLinecap="round" strokeLinejoin="round"
           className={className} aria-hidden="true" {...rest}>
        {children}
      </svg>
    );

    const PlayCircle   = ({fill='none',...p}) => <Icon fill={fill} {...p}><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></Icon>;
    const Grid         = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft  = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
    const Tv           = (p) => <Icon {...p}><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></Icon>;
    const ArrowLeft    = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
    const Activity     = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
    const ShieldAlert  = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
    const Cpu          = (p) => <Icon {...p}><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></Icon>;
    const Box          = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></Icon>;
    const Database     = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></Icon>;
    const Server       = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>;
    const Layers       = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
    const Settings     = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
    const Magnet       = (p) => <Icon {...p}><path d="M6 15A6 6 0 0 0 6 3v12"/><path d="M18 15A6 6 0 0 0 18 3v12"/><line x1="6" y1="3" x2="18" y2="3"/><line x1="6" y1="19" x2="18" y2="19"/></Icon>;
    const Info         = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const HelpCircle   = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
    const InfinityIcon = (p) => <Icon {...p}><path d="M12 12c-2-2.5-4-4-6-4a4 4 0 0 0 0 8c2 0 4-1.5 6-4z"/><path d="M12 12c2 2.5 4 4 6 4a4 4 0 0 0 0-8c-2 0-4 1.5-6 4z"/></Icon>;
    const Radio        = (p) => <Icon {...p}><circle cx="12" cy="12" r="2"/><path d="M4.93 19.07A10 10 0 1 1 19.07 4.93"/><path d="M7.76 16.24a6 6 0 1 1 8.48-8.48"/></Icon>;
    const Code         = (p) => <Icon {...p}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></Icon>;
    const User         = (p) => <Icon {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Laptop       = (p) => <Icon {...p}><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"/></Icon>;
    const Smartphone   = (p) => <Icon {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></Icon>;

    /* ─── Global CSS ──────────────────────────────────────────────── */
    const globalStyles = `
      @keyframes dashAnim {
        from { stroke-dashoffset: 24; }
        to { stroke-dashoffset: 0; }
      }
      .flow-line {
        stroke-dasharray: 8;
        animation: dashAnim 1.5s linear infinite;
      }
      .fade-in { animation: fadeIn 0.8s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .tech-underline { position: relative; }
      .tech-underline::after {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, #666 0%, transparent 100%);
      }
      /* hide scrollbars */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    `;

    /* ─── Contexts ────────────────────────────────────────────────── */
    const MagneticContext = createContext(false);
    const WhatIsContext   = createContext(false);

    /* ─── Magnetic Node ───────────────────────────────────────────── */
    const MagneticNode = ({ children, className = '' }) => {
      const isEnabled = useContext(MagneticContext);
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const nodeRef = useRef(null);

      const handleMouseMove = (e) => {
        if (!isEnabled || !nodeRef.current) return;
        const rect = nodeRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) * 0.25;
        const y = (e.clientY - rect.top - rect.height / 2) * 0.25;
        setPos({ x, y });
      };
      const handleMouseLeave = () => setPos({ x: 0, y: 0 });

      useEffect(() => {
        if (!isEnabled && (pos.x !== 0 || pos.y !== 0)) setPos({ x: 0, y: 0 });
      }, [isEnabled, pos]);

      return (
        <div
          ref={nodeRef}
          className={`inline-block z-10 ${className}`}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{
            transform: `translate(${pos.x}px, ${pos.y}px)`,
            transition: pos.x === 0 && pos.y === 0 ? 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)' : 'none',
            willChange: 'transform'
          }}
        >
          {children}
        </div>
      );
    };

    /* ─── Real Icon (SimpleIcons CDN) ─────────────────────────────── */
    const RealIcon = ({ slug, color = 'white', name, desc, tooltipTitle, hideLabel, size = 44, className = '', fallbackIcon: Fallback, customImg }) => {
      const [hasError, setHasError] = useState(false);
      const isWhatIsEnabled = useContext(WhatIsContext);

      return (
        <MagneticNode className={className}>
          <div className="flex flex-col items-center justify-center gap-1 group cursor-pointer relative">
            {isWhatIsEnabled && desc && (
              <div className="absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-48 md:w-56 p-3 bg-gray-900/95 backdrop-blur-md text-gray-300 text-[11px] leading-relaxed text-center rounded-xl border border-gray-700 shadow-2xl opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none z-50 scale-95 group-hover:scale-100">
                <div className="font-bold text-white text-xs mb-1 tracking-wider">{tooltipTitle || name}</div>
                {desc}
                <div className="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-gray-700" />
              </div>
            )}
            <div className="relative flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
              {customImg ? (
                <img src={customImg} alt={name} style={{ width: size, height: size }} className="object-contain" />
              ) : !hasError && slug ? (
                <img
                  src={`https://cdn.simpleicons.org/${slug}/${color.replace('#', '')}`}
                  alt={name}
                  style={{ width: size, height: size }}
                  className="object-contain pointer-events-none"
                  onError={() => setHasError(true)}
                />
              ) : (
                Fallback ? (
                  <Fallback size={size} color={color.startsWith('#') ? color : `#${color}`} />
                ) : (
                  <div style={{ width: size, height: size, borderColor: color.startsWith('#') ? color : `#${color}` }} className="bg-gray-800/80 rounded flex items-center justify-center border shadow-lg">
                    <span className="text-xs font-black tracking-tighter" style={{ color: color.startsWith('#') ? color : `#${color}` }}>
                      {(tooltipTitle || name) ? (tooltipTitle || name).substring(0, 2).toUpperCase() : 'NA'}
                    </span>
                  </div>
                )
              )}
            </div>
            {name && !hideLabel && (
              <span className="text-[10px] md:text-[11px] font-semibold tracking-wide text-gray-300 group-hover:text-white transition-colors text-center leading-tight mt-1">
                {name}
              </span>
            )}
          </div>
        </MagneticNode>
      );
    };

    /* ─── Custom Fallback: Elastic Transcoder ─────────────────────── */
    const ElasticTranscoderIcon = ({ size }) => (
      <div className="relative" style={{ width: size, height: size * 1.25 }}>
        <div className="absolute top-[40%] w-full h-[40%] bg-yellow-600 rounded-[50%] border border-yellow-800 shadow-md" />
        <div className="absolute top-[20%] w-full h-[40%] bg-yellow-500 rounded-[50%] border border-yellow-700 shadow-md" />
        <div className="absolute top-[0%] w-full h-[40%] bg-yellow-400 rounded-[50%] border border-yellow-600 shadow-md" />
      </div>
    );

    /* ─── Services Data ───────────────────────────────────────────── */
    const SERVICES_DATA = [
      { category: "Client & Frontend", icon: <Grid />, color: "text-blue-400", items: [
        { name: "Swift",      slug: "swift",      color: "F05138", desc: "A powerful programming language created by Apple, used by Netflix to build native, high-performance iOS apps." },
        { name: "Kotlin",     slug: "kotlin",     color: "7F52FF", desc: "A modern programming language used as the primary building block for creating smooth Android applications." },
        { name: "React",      slug: "react",      color: "61DAFB", desc: "A JavaScript library created by Meta for building dynamic, fast, and interactive user interfaces for web apps." },
        { name: "HTML5",      slug: "html5",      color: "E34F26", desc: "The standard markup language used to structure and display content seamlessly on the World Wide Web." },
        { name: "JavaScript", slug: "javascript", color: "F7DF1E", desc: "The core programming language of the web that brings interactive and dynamic content to your browser." },
      ]},
      { category: "API & Backend", icon: <Server />, color: "text-green-400", items: [
        { name: "GraphQL",       slug: "graphql",  color: "E10098", desc: "A smart data query language that lets apps ask for exactly the data they need, preventing wasted bandwidth." },
        { name: "Spring Boot",   slug: "springboot", color: "6DB33F", desc: "A Java framework used to build standalone, production-ready backend microservices quickly and securely." },
        { name: "Netflix Zuul",  slug: "netflix",  color: "E50914", desc: "Netflix's own API gateway that handles routing, filtering, and security for all incoming user traffic." },
        { name: "Netflix Eureka",slug: "netflix",  color: "E50914", desc: "A dynamic service registry (like a phonebook) helping thousands of microservices find and talk to each other." },
      ]},
      { category: "Databases & Storage", icon: <Database />, color: "text-purple-400", items: [
        { name: "MySQL",       slug: "mysql",          color: "4479A1", desc: "A widely-used relational database management system used for storing highly structured, transactional data." },
        { name: "Cassandra",   slug: "apachecassandra",color: "1287B1", desc: "A highly scalable NoSQL database built to handle massive amounts of data across multiple servers with zero downtime." },
        { name: "CockroachDB", slug: "cockroachlabs",  color: "6933FF", desc: "A distributed SQL database designed for global scale, consistency, and survivability against data center failures." },
        { name: "AWS S3",      slug: "amazonaws",      color: "569A31", fallback: Database, desc: "Amazon's highly durable cloud storage service, acting as the main vault for Netflix's massive video files." },
      ]},
      { category: "Streaming & Messaging", icon: <Activity />, color: "text-red-400", items: [
        { name: "Apache Kafka",  slug: "apachekafka", color: "white",  desc: "A distributed streaming platform acting as the central nervous system, handling trillions of user events per day." },
        { name: "Apache Flink",  slug: "apacheflink", color: "E6526F", desc: "A stream processing engine used to analyze, filter, and process massive streams of data instantly as it arrives." },
        { name: "AWS CloudFront",slug: "amazonaws",   color: "FF9900", desc: "Amazon's Content Delivery Network (CDN) that speeds up the delivery of static assets and APIs globally." },
        { name: "Open Connect",  slug: "netflix",     color: "E50914", desc: "Netflix's custom hardware and CDN placed directly inside your local internet provider for buffer-free video delivery." },
      ]},
      { category: "Big Data & Analytics", icon: <Layers />, color: "text-cyan-400", items: [
        { name: "Apache Spark", slug: "apachespark", color: "E25A1C", desc: "A lightning-fast analytics engine used to process massive datasets and train Netflix's recommendation algorithms." },
        { name: "Redshift",     slug: "amazonaws",   color: "8C4FFF", fallback: Database, desc: "Amazon's petabyte-scale data warehouse used to run complex queries and uncover trends in viewer habits." },
        { name: "Tableau",      slug: "tableau",     color: "E97627", desc: "A visual analytics platform used by data scientists to create interactive dashboards and visualize business metrics." },
        { name: "Apache Druid", slug: "apachedruid", color: "29BFFF", desc: "A real-time analytics database designed for fast slice-and-dice exploration of extremely large datasets." },
      ]},
      { category: "DevOps & CI/CD", icon: <Settings />, color: "text-yellow-400", items: [
        { name: "JIRA",       slug: "jira",       color: "0052CC", desc: "An agile project management tool used by engineers to track issues, plan tasks, and manage software releases." },
        { name: "Confluence", slug: "confluence", color: "172B4D", desc: "A collaborative workspace where teams document their code, share knowledge, and outline architecture." },
        { name: "Jenkins",    slug: "jenkins",    color: "D33833", desc: "An automation server used to automatically build, test, and prepare software code for deployment continuously." },
        { name: "Gradle",     slug: "gradle",     color: "white",  desc: "A flexible build automation tool used to compile code, run tests, and package applications reliably." },
        { name: "Spinnaker",  slug: "spinnaker",  color: "139C85", desc: "An open-source continuous delivery platform created by Netflix to safely deploy software updates to the cloud." },
      ]}
    ];

    /* ─── Storyboard Steps ────────────────────────────────────────── */
    const STORY_STEPS = [
      { id: 'intro',    text: "Netflix's tech stack, built on AWS, is a masterpiece designed to serve viewers globally. Let's unpack the key pieces.", active: ['Users', 'DevOps', 'Mobile', 'Frontend', 'GraphQL', 'Backend', 'Database', 'Streaming', 'Messaging', 'BigData'], cam: { x: 0,    y: 0,    scale: 0.52 } },
      { id: 'client',   text: "On mobile, Swift and Kotlin are the building blocks, while React powers the web.", active: ['Users', 'Mobile', 'Frontend'], cam: { x: 370,  y: 180,  scale: 1.2  } },
      { id: 'api',      text: "For communication, REST and GraphQL handle client-server interaction.", active: ['Frontend', 'Mobile', 'GraphQL', 'Backend'], cam: { x: 40,   y: 380,  scale: 1.4  } },
      { id: 'backend',  text: "gRPC powers microservices and WebSocket facilitates real-time connections.", active: ['Backend'], cam: { x: -300, y: 430,  scale: 1.4  } },
      { id: 'storage',  text: "In storage, Cassandra and S3 keep data safe.", active: ['Backend', 'BigData'], cam: { x: -300, y: 190,  scale: 1.35 } },
      { id: 'messaging',text: "Kafka and Flink manage big data streaming...", active: ['Messaging', 'Backend'], cam: { x: -300, y: -150, scale: 1.4  } },
      { id: 'streaming',text: "...with S3 and Netflix's own Open Connect ensuring videos are stored and distributed efficiently.", active: ['Streaming', 'BigData'], cam: { x: 40,   y: -100, scale: 1.4  } },
      { id: 'bigdata',  text: "Massive datasets are structured in Redshift, processed by Apache Spark, and visualized using Tableau and Druid to perfect the recommendation engine.", active: ['BigData'], cam: { x: -50,  y: -300, scale: 1.2  } },
      { id: 'titus',    text: "Netflix's own Titus simplifies deploying and scaling, supported by Atlas for monitoring and Eureka for service discovery.", active: ['DevOps', 'Backend'], cam: { x: -450, y: 150,  scale: 1.1  } },
      { id: 'devtools', text: "Development tools like Jira, Jenkins, and Spinnaker streamline workflows.", active: ['DevOps'], cam: { x: -560, y: 350,  scale: 1.3  } },
      { id: 'chaos',    text: "Chaos Monkey tests systems resilience by deliberately causing problems, highlighting Netflix's dedication to reliability.", active: ['DevOps'], cam: { x: -560, y: 50,   scale: 1.4  } },
    ];

    const isAct = (step, id) => step.active.includes(id);

    /* ─── Main App ────────────────────────────────────────────────── */
    function NetflixPortal() {
      const [view, setView] = useState('landing');
      const [isMagneticEnabled, setIsMagneticEnabled] = useState(false);
      const [isWhatIsEnabled,   setIsWhatIsEnabled]   = useState(false);
      const [showWhatIsToast,   setShowWhatIsToast]   = useState(false);

      const toggleWhatIs = () => {
        const next = !isWhatIsEnabled;
        setIsWhatIsEnabled(next);
        if (next) {
          setShowWhatIsToast(true);
          setTimeout(() => setShowWhatIsToast(false), 5000);
        }
      };

      return (
        <MagneticContext.Provider value={isMagneticEnabled}>
          <WhatIsContext.Provider value={isWhatIsEnabled}>
            <div className="min-h-screen w-full bg-[#0a0a0a] text-white font-sans overflow-hidden flex flex-col selection:bg-[#E50914] selection:text-white relative">
              <style>{globalStyles}</style>

              {/* Background */}
              <div className="absolute inset-0 pointer-events-none z-0">
                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#1a0505] via-[#0a0a0a] to-[#0a0a0a] opacity-80" />
              </div>

              {/* Back to dashboard — always visible */}
              <a
                href="index.html"
                className="fixed top-4 right-4 z-[100] flex items-center gap-2 bg-black/70 backdrop-blur-md border border-gray-700 px-4 py-2 rounded-full text-sm font-semibold text-gray-300 hover:text-white hover:bg-gray-800/90 hover:border-gray-500 transition-all"
              >
                <ArrowLeft size={14} /> Dashboard
              </a>

              <div className="relative z-10 w-full h-full flex flex-col flex-1 fade-in">
                {view === 'landing'  && <LandingView  onSelect={setView} />}
                {view === 'services' && <ServicesView   onBack={() => setView('landing')} />}
                {view === 'story'    && <StoryboardView onFinish={() => setView('landing')} />}
              </div>

              {/* Global Bottom-Left Toggles Menu */}
              <div className="fixed bottom-6 left-6 z-50 flex flex-col gap-3">
                {showWhatIsToast && (
                  <div className="absolute bottom-full left-0 mb-3 w-max bg-blue-900/95 border border-blue-500 text-blue-100 px-4 py-3 rounded-xl text-sm shadow-2xl flex items-center gap-3 animate-fade-in-up">
                    <Info size={18} className="text-blue-400" />
                    <span className="font-medium tracking-wide">Move your mouse over any icon to explain what it is!</span>
                  </div>
                )}
                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setIsMagneticEnabled(!isMagneticEnabled)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-full border backdrop-blur-md transition-all duration-300 w-max ${isMagneticEnabled ? 'bg-[#E50914]/20 border-[#E50914]/50 text-white shadow-[0_0_15px_rgba(229,9,20,0.3)]' : 'bg-black/50 border-gray-700 text-gray-400 hover:text-white hover:border-gray-500'}`}

    function StoryboardView({ onFinish }) {
      const [stepIdx, setStepIdx] = useState(0);
      const step = STORY_STEPS[stepIdx];

      const nextStep = useCallback(() => { if (stepIdx < STORY_STEPS.length - 1) setStepIdx(p => p + 1); }, [stepIdx]);
      const prevStep = useCallback(() => { if (stepIdx > 0) setStepIdx(p => p - 1); }, [stepIdx]);

      useEffect(() => {
        const handle = (e) => {
          if (e.key === 'ArrowRight') nextStep();
          if (e.key === 'ArrowLeft')  prevStep();
        };
        window.addEventListener('keydown', handle);
        return () => window.removeEventListener('keydown', handle);
      }, [nextStep, prevStep]);

      const transformStyle = {
        transform: `translate(calc(-50% + ${step.cam.x}px), calc(-50% + ${step.cam.y}px)) scale(${step.cam.scale})`
      };

                        <circle cx="38.5" cy="28.5" r="0.9" fill="#555"/>
                        {/* Motion lines */}
                        <line x1="2" y1="17" x2="6" y2="17" stroke="#F05138" strokeWidth="1.2" strokeLinecap="round" opacity="0.55"/>
                        <line x1="1" y1="21" x2="5" y2="21" stroke="#F05138" strokeWidth="1.2" strokeLinecap="round" opacity="0.3"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Mobile</div>
                      <div style={{fontSize:'9px',color:'rgba(251,146,60,0.9)',fontWeight:500,lineHeight:1.3}}>🚌 On the Go</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#f97316',flexShrink:0,boxShadow:'0 0 6px #f97316',animation:'pulse 2s infinite'}}/>
                  </div>
                </MagneticNode>

                {/* iPad — person lounging with tablet */}
                <MagneticNode>
                  <div className="flex items-center gap-2.5 p-2.5 rounded-xl cursor-default transition-all hover:scale-[1.02]" style={{border:'1px solid rgba(168,85,247,0.4)',background:'rgba(88,28,135,0.15)'}}>
                    <div style={{width:48,height:40,flexShrink:0}}>
                      <svg viewBox="0 0 50 40" style={{width:'100%',height:'100%'}}>
                        {/* Person lounging */}
                        <circle cx="9" cy="9" r="5" fill="#666"/>
                        <path d="M4 14 Q9 17.5 14 14 L15 24 L5 24 Z" fill="#444"/>
                        {/* Arm holding tablet */}
                        <line x1="14" y1="18" x2="22" y2="13" stroke="#666" strokeWidth="2.2" strokeLinecap="round"/>
                        {/* Legs extended (lounging) */}
                        <line x1="6" y1="24" x2="4" y2="36" stroke="#666" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="13" y1="24" x2="17" y2="34" stroke="#666" strokeWidth="2" strokeLinecap="round"/>
                        {/* Floor / surface */}
                        <line x1="2" y1="37" x2="21" y2="37" stroke="#444" strokeWidth="1.5" strokeLinecap="round"/>
                        {/* Tablet */}
                        <rect x="22" y="4" width="24" height="32" rx="2.5" fill="#111" stroke="#9333EA" strokeWidth="1.5"/>
                        <rect x="24" y="7" width="20" height="25" fill="#E50914" fillOpacity="0.22"/>
                        <circle cx="34" cy="35" r="0.9" fill="#555"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>iPad / Tablet</div>
                      <div style={{fontSize:'9px',color:'rgba(192,132,252,0.9)',fontWeight:500,lineHeight:1.3}}>🛋️ Living Room</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#a855f7',flexShrink:0,boxShadow:'0 0 6px #a855f7',animation:'pulse 2s infinite'}}/>
                  </div>
                </MagneticNode>

                {/* Laptop — person at desk */}
                <MagneticNode>
                  <div className="flex items-center gap-2.5 p-2.5 rounded-xl cursor-default transition-all hover:scale-[1.02]" style={{border:'1px solid rgba(59,130,246,0.4)',background:'rgba(30,58,138,0.15)'}}>
                    <div style={{width:48,height:40,flexShrink:0}}>
                      <svg viewBox="0 0 50 40" style={{width:'100%',height:'100%'}}>
                        {/* Laptop screen */}
                        <rect x="2" y="4" width="28" height="20" rx="1.5" fill="#0d0d0d" stroke="#3B82F6" strokeWidth="1.5"/>
                        <rect x="4" y="6" width="24" height="15" fill="#E50914" fillOpacity="0.22"/>
                        {/* Laptop base */}
                        <path d="M0 24 L32 24 L30 28 L2 28 Z" fill="#1a1a1a" stroke="#3B82F6" strokeWidth="1"/>
                        {/* Person sitting at desk — to the right */}
                        <circle cx="42" cy="11" r="5" fill="#666"/>
                        <path d="M37 16 Q42 20 47 16 L47 30 L37 30 Z" fill="#444"/>
                        {/* Arm reaching to keyboard */}
                        <path d="M38 24 C 32 25, 24 24, 20 24" stroke="#666" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Laptop / PC</div>
                      <div style={{fontSize:'9px',color:'rgba(96,165,250,0.9)',fontWeight:500,lineHeight:1.3}}>💻 At the Desk</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#3b82f6',flexShrink:0,boxShadow:'0 0 6px #3b82f6',animation:'pulse 2s infinite'}}/>
                  </div>
                </MagneticNode>

                <div style={{fontSize:'8px',color:'#4b5563',textAlign:'center',letterSpacing:'0.1em',textTransform:'uppercase',marginTop:2}}>220M+ Subscribers</div>
              </DiagramGroup>

              {/* 1. DevOps */}
              <DiagramGroup id="DevOps" title="DevOps" step={step} className="w-[120px] h-[930px] left-[1150px] top-[40px] flex px-2 py-8">
                <div className="flex flex-col items-center justify-between w-full h-full pb-4">
                  <div className="flex flex-col items-center gap-1">
                    <div className="relative flex items-center justify-center text-gray-500 mb-2">
                      <InfinityIcon size={64} strokeWidth={1} />
                      <div className="absolute text-[8px] font-bold tracking-widest flex w-full justify-between px-[6px]"><span>CI</span><span>CD</span></div>
                    </div>
                  </div>
                  <RealIcon slug="jira"       color="0052CC" name="JIRA"          size={40} desc="An agile project management tool used by engineers to track issues, plan tasks, and manage software releases." />
                  <RealIcon slug="confluence" color="172B4D" name="Confluence"    size={40} desc="A collaborative workspace where teams document their code, share knowledge, and outline architecture." />
                  <RealIcon slug="jenkins"    color="D33833" name="Jenkins"       size={40} desc="An automation server used to automatically build, test, and prepare software code for deployment continuously." />
                  <RealIcon slug="spinnaker"  color="139C85" name="Spinnaker"     size={40} desc="An open-source continuous delivery platform created by Netflix to safely deploy software updates to the cloud." />
                  <RealIcon fallbackIcon={Activity}    color="3B82F6" name="N. Atlas"        size={40} desc="Netflix's primary in-memory dimensional time series database for operational monitoring." />
                  <RealIcon fallbackIcon={ShieldAlert} color="EF4444" name="N. Chaos Monkey" size={40} desc="A tool that intentionally disables computers in Netflix's production network to test resilience." />
                  <RealIcon slug="gradle"     color="11B072" name="Gradle"        size={40} desc="A flexible build automation tool used to compile code, run tests, and package applications reliably." />
                  <RealIcon fallbackIcon={Cpu}         color="DC2626" name="nebula"          size={40} desc="A collection of Gradle plugins built by Netflix to standardise builds." />
                </div>
              </DiagramGroup>

              {/* 2. Mobile */}
              <DiagramGroup id="Mobile" title="Mobile" step={step} className="w-[210px] h-[320px] left-[250px] top-[40px] flex flex-col items-center justify-center gap-3 pt-4">
                <MagneticNode>
                  <NetflixMobileMockup />
                </MagneticNode>
                <div className="flex flex-col gap-2 w-full px-4">
                  <div className="flex items-center justify-center gap-6">
                    <div className="flex items-center gap-2"><RealIcon slug="kotlin" color="7F52FF" size={24} tooltipTitle="Kotlin" desc="Primary language for Android apps." hideLabel /><span className="font-bold text-sm">Kotlin</span></div>
                    <div className="flex items-center gap-2"><RealIcon slug="swift"  color="F05138" size={24} tooltipTitle="Swift"  desc="Primary language for iOS apps." hideLabel /><span className="font-bold text-sm text-orange-500">Swift</span></div>
                  </div>
                </div>
              </DiagramGroup>

              {/* 3. Frontend */}
              <DiagramGroup id="Frontend" title="Frontend" step={step} className="w-[210px] h-[300px] left-[250px] top-[390px] flex flex-col items-center pt-8 gap-4">
                <MagneticNode>
                  <NetflixDesktopMockup />
                </MagneticNode>
                <div className="flex flex-col items-center gap-1 w-full mt-2">
                  <div className="flex items-center gap-2">
                    <RealIcon slug="react" color="61DAFB" size={28} tooltipTitle="React" desc="Netflix's primary web UI library." hideLabel />
                    <span className="text-lg font-bold text-[#61DAFB]">React</span>
                  </div>
                  <div className="flex items-center gap-6 mt-1">
                    <RealIcon slug="html5"      color="E34F26" size={24} tooltipTitle="HTML5"      desc="Markup language for the web." hideLabel />
                    <RealIcon slug="javascript" color="F7DF1E" size={24} tooltipTitle="JavaScript" desc="Core language of the web."   hideLabel />
                  </div>
                </div>
              </DiagramGroup>

              {/* 4. GraphQL Node */}
              <div className={`absolute left-[560px] top-[140px] w-[100px] flex flex-col items-center transition-all duration-700 ${isAct(step,'GraphQL') ? 'opacity-100 scale-100' : 'opacity-30 grayscale scale-95'}`}>
                <RealIcon slug="graphql" color="E10098" size={60} tooltipTitle="GraphQL" desc="Smart data query layer between clients and backend services." hideLabel />
                <span className="text-[13px] font-bold mt-1 text-gray-300">GraphQL</span>
              </div>

              {/* 5. Backend */}
              <DiagramGroup id="Backend" title={<span className="flex items-center gap-2">Backend <Code size={20}/></span>} step={step} className="w-[340px] h-[650px] left-[780px] top-[40px] flex flex-col p-6 pt-12 justify-between">
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 text-underline tech-underline">
                    <Settings size={20} className="text-yellow-500" />
                    <span className="font-bold text-xl tracking-wide">Services</span>
                  </div>
                  <div className="flex items-center justify-between px-2">
                    <RealIcon slug="springboot" color="6DB33F" name="spring boot"   size={44} desc="Java framework for production-ready microservices." />
                    <RealIcon slug="netflix"    color="E50914" name="NETFLIX ZUUL"  size={40} desc="Netflix's API gateway for routing and security." />
                    <RealIcon slug="netflix"    color="E50914" name="NETFLIX EUREKA" size={40} desc="Dynamic service registry for microservice discovery." />
                  </div>
                </div>
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Database')||isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 tech-underline">
                    <Database size={20} className="text-purple-400" />
                    <span className="font-bold text-xl tracking-wide">Database</span>
                  </div>
                  <div className="grid grid-cols-2 gap-y-8 gap-x-2 px-2">
                    <div className="flex items-center gap-2"><RealIcon slug="mysql" color="4479A1" size={36} tooltipTitle="MySQL" desc="Relational database for structured transactional data." hideLabel /><span className="font-bold text-lg text-blue-400 italic">MySQL</span></div>
                    <div className="flex items-center gap-2"><RealIcon slug="apachecassandra" color="1287B1" size={32} tooltipTitle="Cassandra" desc="Scalable NoSQL for massive data across servers." hideLabel /><span className="text-lg font-serif font-bold">cassandra</span></div>
                    <div className="flex items-center gap-2"><RealIcon fallbackIcon={Box} color="EF4444" size={28} tooltipTitle="EVCache" desc="Netflix's in-memory caching solution for fast data access." hideLabel /><span className="font-bold text-lg text-gray-300">EVCache</span></div>
                    <div className="flex items-center gap-2 mt-1 text-sm"><RealIcon slug="cockroachlabs" color="6933FF" size={24} tooltipTitle="CockroachDB" desc="Distributed SQL for global scale and survivability." hideLabel /><span>CockroachDB</span></div>
                  </div>
                </div>
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Messaging')||isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 tech-underline">
                    <Radio size={20} className="text-red-500" />
                    <span className="font-bold text-xl tracking-wide">Messaging / Streaming</span>
                  </div>
                  <div className="flex items-center justify-around pb-2">
                    <RealIcon slug="apachekafka" color="white"  name="kafka"       size={52} desc="Distributed streaming platform — Netflix's event backbone." />
                    <RealIcon slug="apacheflink" color="E6526F" name="Apache Flink" size={52} desc="Real-time stream processing engine for instant data analysis." />
                  </div>
                </div>
              </DiagramGroup>

              {/* 6. Streaming Block */}
              <DiagramGroup id="Streaming" title="Streaming" step={step} className="w-[280px] h-[400px] left-[470px] top-[300px] flex flex-col items-center justify-between py-10">
                <MagneticNode>
                  <div className="bg-[#E50914] p-3 rounded-xl w-40 h-24 flex items-center justify-center border-b-[6px] border-red-900 shadow-[0_0_30px_rgba(229,9,20,0.4)]">
                    <PlayCircle size={64} fill="white" className="text-[#E50914]" />
                  </div>
                </MagneticNode>
                <div className="grid grid-cols-2 gap-y-10 gap-x-8 w-full px-6 mt-6 place-items-center">
                  <RealIcon fallbackIcon={Server}  color="E50914" name="Open Connect"   desc="Netflix's own CDN placed inside your local ISP for buffer-free delivery." size={32} />
                  <RealIcon slug="amazonaws"       color="FF9900" name="CloudFront"      desc="Amazon's CDN that speeds up global delivery of static assets." size={32} />
                  <RealIcon fallbackIcon={Database} color="E50914" name="AWS S3"         desc="Main vault for Netflix's massive video files." size={32} />
                  <RealIcon fallbackIcon={ElasticTranscoderIcon} color="EAB308" name="AWS Transcoder" desc="Cloud-based media transcoding to format videos." size={32} />
                </div>
              </DiagramGroup>

              {/* 7. Big Data Block */}
              <DiagramGroup id="BigData" title="" step={step} className="w-[890px] h-[250px] left-[250px] top-[720px] flex items-center px-6 gap-6 relative">
                <div className="flex flex-col items-center text-cyan-400 w-32 shrink-0">
                  <Activity size={56} strokeWidth={1} className="text-blue-500" />
                  <span className="font-black text-2xl tracking-widest leading-none mt-2 text-center text-blue-400">BIG<br/>DATA</span>
                </div>
                <div className="flex-1 flex flex-col gap-6 pl-8 border-l border-gray-700">
                  <div className="flex items-center gap-8 border-b border-gray-800 pb-4">
                    <span className="text-gray-300 font-bold w-32 tracking-wider">Data Storage</span>
                    <RealIcon fallbackIcon={Database} color="E50914" name="AWS S3"          desc="Durable vault for Netflix's video and data files." size={32} />
                    <div className="flex flex-col items-center gap-1">
                      <RealIcon fallbackIcon={Layers} color="3B82F6" size={32} tooltipTitle="Amazon Redshift" desc="Petabyte-scale data warehouse for complex analytics." hideLabel />
                      <span className="text-[10px] font-semibold text-gray-400">Redshift</span>
                    </div>
                    <RealIcon fallbackIcon={Box}   color="93C5FD" name="Apache Iceberg" desc="Open table format for huge analytic datasets." size={32} />
                    <div className="flex items-center gap-1">
                      <RealIcon slug="apachedruid" color="29BFFF" size={24} tooltipTitle="Apache Druid" desc="Real-time analytics database for fast exploratory queries." hideLabel />
                      <span className="font-bold text-teal-400 text-sm">druid</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-8 pb-4">
                    <span className="text-gray-300 font-bold w-32 tracking-wider">Data Processing</span>
                    <RealIcon slug="tableau"     color="E97627" name="tableau"      desc="Visual analytics for interactive dashboards." size={32} />
                    <RealIcon slug="apacheflink" color="E6526F" name="A. Flink"     desc="Real-time stream processing engine." size={32} />
                    <RealIcon slug="apachespark" color="E25A1C" name="Apache Spark" desc="Lightning-fast analytics and ML algorithm training." size={48} />
                  </div>
                </div>
              </DiagramGroup>

            </div>
          </main>

          {/* Footer Controls */}
          <footer className="h-[20vh] bg-[#050505] border-t border-[#222] p-6 flex flex-col items-center justify-between relative z-10">
            <div className="absolute top-0 left-0 h-1 bg-[#E50914] transition-all duration-500 shadow-[0_0_10px_#E50914]" style={{ width: `${(stepIdx / (STORY_STEPS.length - 1)) * 100}%` }} />
            <div className="flex-1 flex items-center justify-center w-full max-w-5xl px-4">
              <h2 className="text-xl md:text-2xl text-center font-bold leading-relaxed text-gray-200">{step.text}</h2>
            </div>
            <div className="flex items-center gap-6 mt-4 w-full max-w-md justify-between">
              <button onClick={prevStep} disabled={stepIdx === 0} className="p-3 rounded-full bg-gray-800 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all hover:scale-110">
                <ChevronLeft className="w-6 h-6" />
              </button>
              <div className="text-xs md:text-sm font-semibold tracking-widest text-gray-500 uppercase flex items-center gap-2">
                <Tv size={16} className="text-[#E50914]" />
                Step {stepIdx + 1} / {STORY_STEPS.length}
              </div>
              <button onClick={stepIdx === STORY_STEPS.length - 1 ? onFinish : nextStep} className="flex items-center gap-2 px-4 py-3 rounded-full bg-[#E50914] hover:bg-red-700 transition-all shadow-[0_0_15px_rgba(229,9,20,0.5)] hover:scale-110">
                <span className="font-bold">{stepIdx === STORY_STEPS.length - 1 ? 'Finish' : ''}</span>
                <ChevronRight className="w-6 h-6" />
              </button>
            </div>
          </footer>
        </div>
      );
    }

    /* ─── Diagram Group ───────────────────────────────────────────── */
    function DiagramGroup({ id, title, step, className, children }) {
      const active = isAct(step, id);
      return (
        <div className={`absolute border border-dashed border-gray-500 rounded-xl transition-all duration-1000 ${active ? 'opacity-100 shadow-[0_0_40px_rgba(255,255,255,0.02)] bg-[#111]/90 backdrop-blur-sm' : 'opacity-20 grayscale bg-transparent'} ${className}`}>
          {title && (
            <div className={`absolute -top-4 left-6 px-3 bg-[#0a0a0a] text-xl font-bold tracking-wide transition-colors duration-1000 ${active ? 'text-white drop-shadow-md' : 'text-gray-500'}`}>
              {title}
            </div>
          )}
          {children}
        </div>
      );
    }

    /* ─── Mount ───────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NetflixPortal />);
  </script>
</body>
</html>
