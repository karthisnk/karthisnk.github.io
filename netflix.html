      const isEnabled = useContext(MagneticContext);
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const nodeRef = useRef(null);

      const handleMouseMove = (e) => {
        if (!isEnabled || !nodeRef.current) return;
        const rect = nodeRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) * 0.25;
        const y = (e.clientY - rect.top - rect.height / 2) * 0.25;
        setPos({ x, y });
      };
      const handleMouseLeave = () => setPos({ x: 0, y: 0 });

      useEffect(() => {
        if (!isEnabled && (pos.x !== 0 || pos.y !== 0)) setPos({ x: 0, y: 0 });
      }, [isEnabled, pos]);

      return (
        <div
          ref={nodeRef}
          className={`inline-block z-10 ${className}`}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
          style={{
            transform: `translate(${pos.x}px, ${pos.y}px)`,
            transition: pos.x === 0 && pos.y === 0 ? 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)' : 'none',
            willChange: 'transform'
          }}
        >
          {children}

      );

    function StoryboardView({ onFinish }) {
      const [stepIdx, setStepIdx] = useState(0);
      const step = STORY_STEPS[stepIdx];

      const nextStep = useCallback(() => { if (stepIdx < STORY_STEPS.length - 1) setStepIdx(p => p + 1); }, [stepIdx]);
      const prevStep = useCallback(() => { if (stepIdx > 0) setStepIdx(p => p - 1); }, [stepIdx]);

      useEffect(() => {
        const handle = (e) => {
          if (e.key === 'ArrowRight') nextStep();
          if (e.key === 'ArrowLeft')  prevStep();
        };
        window.addEventListener('keydown', handle);
        return () => window.removeEventListener('keydown', handle);
      }, [nextStep, prevStep]);

      const transformStyle = {
        transform: `translate(calc(-50% + ${step.cam.x}px), calc(-50% + ${step.cam.y}px)) scale(${step.cam.scale})`

                        <circle cx="34" cy="35" r="0.9" fill="#555"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>iPad / Tablet</div>
                      <div style={{fontSize:'9px',color:'rgba(192,132,252,0.9)',fontWeight:500,lineHeight:1.3}}>🛋️ Living Room</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#a855f7',flexShrink:0,boxShadow:'0 0 6px #a855f7',animation:'pulse 2s infinite'}}/>
                    <span style={{position:'absolute',top:-2,left:50,fontSize:'11px',pointerEvents:'none',animation:'floatEmoji 3.2s ease-in-out infinite',animationDelay:'2s',opacity:0}}>❤️</span>
                  </div>
                </MagneticNode>

                {/* Card 4 — Laptop / At the Desk */}
                <MagneticNode>
                  <div className="relative flex items-center gap-2.5 p-2.5 rounded-xl cursor-default transition-all hover:scale-[1.02]" style={{border:'1px solid rgba(59,130,246,0.4)',background:'rgba(30,58,138,0.15)'}}>
                    <div style={{width:48,height:40,flexShrink:0,animation:'laptopLean 3.2s ease-in-out infinite'}}>
                      <svg viewBox="0 0 50 40" style={{width:'100%',height:'100%'}}>
                        <rect x="2" y="4" width="28" height="20" rx="1.5" fill="#0d0d0d" stroke="#3B82F6" strokeWidth="1.5"/>
                        <rect x="4" y="6" width="24" height="15" fill="#E50914" fillOpacity="0.22"/>
                        <path d="M0 24 L32 24 L30 28 L2 28 Z" fill="#1a1a1a" stroke="#3B82F6" strokeWidth="1"/>
                        <circle cx="42" cy="11" r="5" fill="#666"/>
                        <path d="M37 16 Q42 20 47 16 L47 30 L37 30 Z" fill="#444"/>
                        <path d="M38 24 C 32 25, 24 24, 20 24" stroke="#666" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Laptop / PC</div>
                      <div style={{fontSize:'9px',color:'rgba(96,165,250,0.9)',fontWeight:500,lineHeight:1.3}}>💻 At the Desk</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#3b82f6',flexShrink:0,boxShadow:'0 0 6px #3b82f6',animation:'pulse 2s infinite'}}/>
                    <span style={{position:'absolute',top:-2,left:50,fontSize:'11px',pointerEvents:'none',animation:'floatEmoji 3.2s ease-in-out infinite',animationDelay:'0.8s',opacity:0}}>👀</span>
                  </div>
                </MagneticNode>

                {/* Card 5 — Couple / Social Viewing */}
                <MagneticNode>
                  <div className="relative flex items-center gap-2.5 p-2.5 rounded-xl cursor-default transition-all hover:scale-[1.02]" style={{border:'1px solid rgba(45,212,191,0.4)',background:'rgba(20,184,166,0.12)'}}>
                    <div style={{width:48,height:40,flexShrink:0,animation:'coupleReact 2.4s ease-in-out infinite'}}>
                      <svg viewBox="0 0 50 40" style={{width:'100%',height:'100%'}}>
                        <rect x="5" y="25" width="28" height="9" rx="2" fill="#1c1c1c" stroke="#3f3f3f" strokeWidth="1"/>
                        <rect x="3" y="23" width="4" height="12" rx="1.5" fill="#222" stroke="#3f3f3f" strokeWidth="1"/>
                        <rect x="35" y="23" width="4" height="12" rx="1.5" fill="#222" stroke="#3f3f3f" strokeWidth="1"/>
                        <circle cx="14" cy="16" r="4.5" fill="#999"/>
                        <path d="M9 21 Q14 25 19 21 L19 30 L9 30 Z" fill="#777"/>
                        <circle cx="26" cy="16" r="4.5" fill="#888"/>
                        <path d="M21 21 Q26 25 31 21 L31 30 L21 30 Z" fill="#666"/>
                        <rect x="19" y="13" width="4" height="7" rx="1" fill="#111" stroke="#2DD4BF" strokeWidth="1"/>
                        <rect x="19.5" y="14" width="3" height="5" fill="#14b8a6" fillOpacity="0.55"/>
                        <path d="M11 19 Q14 20.5 17 19" fill="none" stroke="#fbbf24" strokeWidth="0.9" strokeLinecap="round"/>
                        <path d="M23 19 Q26 20.5 29 19" fill="none" stroke="#fbbf24" strokeWidth="0.9" strokeLinecap="round"/>
                        <text x="38" y="15" fontSize="6" fill="#ef4444">♥</text>
                        <text x="43" y="10" fontSize="4" fill="#ef4444" opacity="0.6">♥</text>
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:'12px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Shared Screens</div>
                      <div style={{fontSize:'9px',color:'rgba(94,234,212,0.9)',fontWeight:500,lineHeight:1.3}}>👫 Social Viewing</div>
                    </div>
                    <div style={{width:7,height:7,borderRadius:'50%',background:'#14b8a6',flexShrink:0,boxShadow:'0 0 6px #14b8a6',animation:'pulse 2s infinite'}}/>
                    <span style={{position:'absolute',top:-2,left:50,fontSize:'11px',pointerEvents:'none',animation:'floatEmoji 3.2s ease-in-out infinite',animationDelay:'1.8s',opacity:0}}>🎬</span>
                  </div>
                </MagneticNode>

                <div style={{fontSize:'8px',color:'#4b5563',textAlign:'center',letterSpacing:'0.1em',textTransform:'uppercase',marginTop:2}}>220M+ Subscribers</div>
              </DiagramGroup>

              {/* 1. DevOps */}
              <DiagramGroup id="DevOps" title="DevOps" step={step} className="w-[120px] h-[930px] left-[1150px] top-[40px] flex px-2 py-8">
                <div className="flex flex-col items-center justify-between w-full h-full pb-4">
                  <div className="flex flex-col items-center gap-1">
                    <div className="relative flex items-center justify-center text-gray-500 mb-2">
                      <InfinityIcon size={64} strokeWidth={1} />
                      <div className="absolute text-[8px] font-bold tracking-widest flex w-full justify-between px-[6px]"><span>CI</span><span>CD</span></div>
                    </div>
                  </div>
                  <RealIcon slug="jira"       color="0052CC" name="JIRA"          size={40} desc="An agile project management tool used by engineers to track issues, plan tasks, and manage software releases." />
                  <RealIcon slug="confluence" color="172B4D" name="Confluence"    size={40} desc="A collaborative workspace where teams document their code, share knowledge, and outline architecture." />
                  <RealIcon slug="jenkins"    color="D33833" name="Jenkins"       size={40} desc="An automation server used to automatically build, test, and prepare software code for deployment continuously." />
                  <RealIcon slug="spinnaker"  color="139C85" name="Spinnaker"     size={40} desc="An open-source continuous delivery platform created by Netflix to safely deploy software updates to the cloud." />
                  <RealIcon fallbackIcon={TitusIcon}       color="E50914" name="N. Titus"         size={40} desc="Netflix's container management platform built on Apache Mesos, running millions of containers a week." />
                  <RealIcon fallbackIcon={AtlasIcon}       color="3B82F6" name="N. Atlas"          size={40} desc="Netflix's primary in-memory dimensional time series database for operational monitoring and alerting." />
                  <RealIcon fallbackIcon={ChaosMonkeyIcon} color="EF4444" name="N. Chaos Monkey"   size={40} desc="A tool that intentionally disables production servers to test that Netflix stays resilient and fault-tolerant." />
                  <RealIcon slug="gradle"     color="11B072" name="Gradle"        size={40} desc="A flexible build automation tool used to compile code, run tests, and package applications reliably." />
                  <RealIcon fallbackIcon={Cpu}             color="DC2626" name="nebula"             size={40} desc="A collection of Gradle plugins built by Netflix to standardise builds across hundreds of microservices." />
                </div>
              </DiagramGroup>

              {/* 2. Mobile */}
              <DiagramGroup id="Mobile" title="Mobile" step={step} className="w-[210px] h-[320px] left-[250px] top-[40px] flex flex-col items-center justify-center gap-3 pt-4">
                <MagneticNode>
                  <NetflixMobileMockup />
                </MagneticNode>
                <div className="flex flex-col gap-2 w-full px-4">
                  <div className="flex items-center justify-center gap-6">
                    <div className="flex items-center gap-2"><RealIcon slug="kotlin" color="7F52FF" size={24} tooltipTitle="Kotlin" desc="Primary language for Android apps." hideLabel /><span className="font-bold text-sm">Kotlin</span></div>
                    <div className="flex items-center gap-2"><RealIcon slug="swift"  color="F05138" size={24} tooltipTitle="Swift"  desc="Primary language for iOS apps." hideLabel /><span className="font-bold text-sm text-orange-500">Swift</span></div>
                  </div>
                </div>
              </DiagramGroup>

              {/* 3. Frontend */}
              <DiagramGroup id="Frontend" title="Frontend" step={step} className="w-[210px] h-[300px] left-[250px] top-[390px] flex flex-col items-center pt-8 gap-4">
                <MagneticNode>
                  <NetflixDesktopMockup />
                </MagneticNode>
                <div className="flex flex-col items-center gap-1 w-full mt-2">
                  <div className="flex items-center gap-2">
                    <RealIcon slug="react" color="61DAFB" size={28} tooltipTitle="React" desc="Netflix's primary web UI library." hideLabel />
                    <span className="text-lg font-bold text-[#61DAFB]">React</span>
                  </div>
                  <div className="flex items-center gap-6 mt-1">
                    <RealIcon slug="html5"      color="E34F26" size={24} tooltipTitle="HTML5"      desc="Markup language for the web." hideLabel />
                    <RealIcon slug="javascript" color="F7DF1E" size={24} tooltipTitle="JavaScript" desc="Core language of the web."   hideLabel />
                  </div>
                </div>
              </DiagramGroup>

              {/* 4. GraphQL Node */}
              <div className={`absolute left-[560px] top-[140px] w-[100px] flex flex-col items-center transition-all duration-700 ${isAct(step,'GraphQL') ? 'opacity-100 scale-100' : 'opacity-30 grayscale scale-95'}`}>
                <RealIcon slug="graphql" color="E10098" size={60} tooltipTitle="GraphQL" desc="Smart data query layer between clients and backend services." hideLabel />
                <span className="text-[13px] font-bold mt-1 text-gray-300">GraphQL</span>
              </div>

              {/* 4b. Protocol Group — gRPC, REST, WebSocket */}
              <DiagramGroup id="Protocol" title="API Protocols" step={step} className="w-[220px] h-[130px] left-[530px] top-[310px] flex flex-col items-center justify-center gap-2 py-4">
                <div className="flex items-center justify-around w-full px-3">
                  <RealIcon fallbackIcon={RestIcon}      color="22c55e" name="REST"      size={36} desc="Standard HTTP verbs — GET, POST, PUT, DELETE — for stateless client-server communication." />
                  <RealIcon fallbackIcon={GrpcIcon}      color="4ade80" name="gRPC"      size={36} desc="High-performance binary RPC used by Netflix microservices for ultra-low latency calls." />
                  <RealIcon fallbackIcon={WebSocketIcon} color="38bdf8" name="WebSocket"  size={36} desc="Full-duplex real-time connections powering live notifications, watch-party sync, and activity feeds." />
                </div>
              </DiagramGroup>

              {/* 5. Backend */}
              <DiagramGroup id="Backend" title={<span className="flex items-center gap-2">Backend <Code size={20}/></span>} step={step} className="w-[340px] h-[650px] left-[780px] top-[40px] flex flex-col p-6 pt-12 justify-between">
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 text-underline tech-underline">
                    <Settings size={20} className="text-yellow-500" />
                    <span className="font-bold text-xl tracking-wide">Services</span>
                  </div>
                  <div className="flex items-center justify-between px-2">
                    <RealIcon slug="springboot" color="6DB33F" name="spring boot"   size={44} desc="Java framework for production-ready microservices." />
                    <RealIcon slug="netflix"    color="E50914" name="NETFLIX ZUUL"  size={40} desc="Netflix's API gateway for routing and security." />
                    <RealIcon slug="netflix"    color="E50914" name="NETFLIX EUREKA" size={40} desc="Dynamic service registry for microservice discovery." />
                  </div>
                </div>
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Database')||isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 tech-underline">
                    <Database size={20} className="text-purple-400" />
                    <span className="font-bold text-xl tracking-wide">Database</span>
                  </div>
                  <div className="grid grid-cols-2 gap-y-8 gap-x-2 px-2">
                    <div className="flex items-center gap-2"><RealIcon slug="mysql" color="4479A1" size={36} tooltipTitle="MySQL" desc="Relational database for structured transactional data." hideLabel /><span className="font-bold text-lg text-blue-400 italic">MySQL</span></div>
                    <div className="flex items-center gap-2"><RealIcon slug="apachecassandra" color="1287B1" size={32} tooltipTitle="Cassandra" desc="Scalable NoSQL for massive data across servers." hideLabel /><span className="text-lg font-serif font-bold">cassandra</span></div>
                    <div className="flex items-center gap-2"><RealIcon fallbackIcon={Box} color="EF4444" size={28} tooltipTitle="EVCache" desc="Netflix's in-memory caching solution for fast data access." hideLabel /><span className="font-bold text-lg text-gray-300">EVCache</span></div>
                    <div className="flex items-center gap-2 mt-1 text-sm"><RealIcon slug="cockroachlabs" color="6933FF" size={24} tooltipTitle="CockroachDB" desc="Distributed SQL for global scale and survivability." hideLabel /><span>CockroachDB</span></div>
                  </div>
                </div>
                <div className={`transition-all duration-500 flex flex-col gap-6 ${isAct(step,'Messaging')||isAct(step,'Backend') ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center gap-2 tech-underline">
                    <Radio size={20} className="text-red-500" />
                    <span className="font-bold text-xl tracking-wide">Messaging / Streaming</span>
                  </div>
                  <div className="flex items-center justify-around pb-2">
                    <RealIcon slug="apachekafka" color="white"  name="kafka"       size={52} desc="Distributed streaming platform — Netflix's event backbone." />
                    <RealIcon slug="apacheflink" color="E6526F" name="Apache Flink" size={52} desc="Real-time stream processing engine for instant data analysis." />
                  </div>
                </div>
              </DiagramGroup>

              {/* 6. Streaming Block */}
              <DiagramGroup id="Streaming" title="Streaming" step={step} className="w-[280px] h-[400px] left-[470px] top-[300px] flex flex-col items-center justify-between py-10">
                <MagneticNode>
                  <div className="bg-[#E50914] p-3 rounded-xl w-40 h-24 flex items-center justify-center border-b-[6px] border-red-900 shadow-[0_0_30px_rgba(229,9,20,0.4)]">
                    <PlayCircle size={64} fill="white" className="text-[#E50914]" />
                  </div>
                </MagneticNode>
                <div className="grid grid-cols-2 gap-y-10 gap-x-8 w-full px-6 mt-6 place-items-center">
                  <RealIcon fallbackIcon={Server}  color="E50914" name="Open Connect"   desc="Netflix's own CDN placed inside your local ISP for buffer-free delivery." size={32} />
                  <RealIcon slug="amazonaws"       color="FF9900" name="CloudFront"      desc="Amazon's CDN that speeds up global delivery of static assets." size={32} />
                  <RealIcon fallbackIcon={Database} color="E50914" name="AWS S3"         desc="Main vault for Netflix's massive video files." size={32} />
                  <RealIcon fallbackIcon={ElasticTranscoderIcon} color="EAB308" name="AWS Transcoder" desc="Cloud-based media transcoding to format videos." size={32} />
                </div>
              </DiagramGroup>

              {/* 7. Big Data Block */}
              <DiagramGroup id="BigData" title="" step={step} className="w-[890px] h-[250px] left-[250px] top-[720px] flex items-center px-6 gap-6 relative">
                <div className="flex flex-col items-center text-cyan-400 w-32 shrink-0">
                  <Activity size={56} strokeWidth={1} className="text-blue-500" />
                  <span className="font-black text-2xl tracking-widest leading-none mt-2 text-center text-blue-400">BIG<br/>DATA</span>
                </div>
                <div className="flex-1 flex flex-col gap-6 pl-8 border-l border-gray-700">
                  <div className="flex items-center gap-8 border-b border-gray-800 pb-4">
                    <span className="text-gray-300 font-bold w-32 tracking-wider">Data Storage</span>
                    <RealIcon fallbackIcon={Database} color="E50914" name="AWS S3"          desc="Durable vault for Netflix's video and data files." size={32} />
                    <div className="flex flex-col items-center gap-1">
                      <RealIcon fallbackIcon={Layers} color="3B82F6" size={32} tooltipTitle="Amazon Redshift" desc="Petabyte-scale data warehouse for complex analytics." hideLabel />
                      <span className="text-[10px] font-semibold text-gray-400">Redshift</span>
                    </div>
                    <RealIcon fallbackIcon={Box}   color="93C5FD" name="Apache Iceberg" desc="Open table format for huge analytic datasets." size={32} />
                    <div className="flex items-center gap-1">
                      <RealIcon slug="apachedruid" color="29BFFF" size={24} tooltipTitle="Apache Druid" desc="Real-time analytics database for fast exploratory queries." hideLabel />
                      <span className="font-bold text-teal-400 text-sm">druid</span>
                    </div>
                  </div>
                  <div className="flex items-center gap-8 pb-4">
                    <span className="text-gray-300 font-bold w-32 tracking-wider">Data Processing</span>
                    <RealIcon slug="tableau"     color="E97627" name="tableau"      desc="Visual analytics for interactive dashboards." size={32} />
                    <RealIcon slug="apacheflink" color="E6526F" name="A. Flink"     desc="Real-time stream processing engine." size={32} />
                    <RealIcon slug="apachespark" color="E25A1C" name="Apache Spark" desc="Lightning-fast analytics and ML algorithm training." size={48} />
                  </div>
                </div>
              </DiagramGroup>

            </div>
          </main>

          {/* Footer Controls */}
          <footer className="h-[20vh] bg-[#050505] border-t border-[#222] p-6 flex flex-col items-center justify-between relative z-10">
            <div className="absolute top-0 left-0 h-1 bg-[#E50914] transition-all duration-500 shadow-[0_0_10px_#E50914]" style={{ width: `${(stepIdx / (STORY_STEPS.length - 1)) * 100}%` }} />
            <div className="flex-1 flex items-center justify-center w-full max-w-5xl px-4">
              <h2 className="text-xl md:text-2xl text-center font-bold leading-relaxed text-gray-200">{step.text}</h2>
            </div>
            <div className="flex items-center gap-6 mt-4 w-full max-w-md justify-between">
              <button onClick={prevStep} disabled={stepIdx === 0} className="p-3 rounded-full bg-gray-800 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all hover:scale-110">
                <ChevronLeft className="w-6 h-6" />
              </button>
              <div className="text-xs md:text-sm font-semibold tracking-widest text-gray-500 uppercase flex items-center gap-2">
                <Tv size={16} className="text-[#E50914]" />
                Step {stepIdx + 1} / {STORY_STEPS.length}
              </div>
              <button onClick={stepIdx === STORY_STEPS.length - 1 ? onFinish : nextStep} className="flex items-center gap-2 px-4 py-3 rounded-full bg-[#E50914] hover:bg-red-700 transition-all shadow-[0_0_15px_rgba(229,9,20,0.5)] hover:scale-110">
                <span className="font-bold">{stepIdx === STORY_STEPS.length - 1 ? 'Finish' : ''}</span>
                <ChevronRight className="w-6 h-6" />
              </button>
            </div>
          </footer>
        </div>
      );
    }

    /* ─── Diagram Group ───────────────────────────────────────────── */
    function DiagramGroup({ id, title, step, className, children }) {
      const active = isAct(step, id);
      const glowClass = active ? 'diagram-group-active' : '';
      return (
        <div className={`absolute border border-dashed rounded-xl transition-all duration-1000 ${active ? `opacity-100 border-red-600/40 bg-[#111]/90 backdrop-blur-sm node-activate ${glowClass}` : 'opacity-20 grayscale bg-transparent border-gray-500'} ${className}`}>
          {title && (
            <div className={`absolute -top-4 left-6 px-3 bg-[#0a0a0a] text-xl font-bold tracking-wide transition-colors duration-1000 ${active ? 'text-white drop-shadow-md' : 'text-gray-500'}`}>
              {title}
            </div>
          )}
          {children}
        </div>
      );
    }

    /* ─── Mount ───────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NetflixPortal />);
  </script>
</body>
</html>
